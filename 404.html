<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Pro</title>
    <script type="text/javascript">
        (function() {
            var path = window.location.pathname.toLowerCase();
            var cleanPath = path.replace(/^\/|\/$/g, '');
            
            // 1. CHAT CHECK
            if (path.startsWith("/chat")) return;

            // 2. REDIRECT TABLE
            var redirects = {
                "2faa": "https://s.samy.pro.bd/p/2fa.html",
                "qr": "https://s.samy.pro.bd/p/qr.html",
                "password": "https://vault.bitwarden.eu",
                "p": "https://vault.bitwarden.eu"
            };

            // 3. LOGIC
            if (redirects[cleanPath]) {
                window.location.replace(redirects[cleanPath] + window.location.search + window.location.hash);
            } else if (cleanPath === "" || cleanPath === "index.html") {
                window.location.replace("https://www.samy.pro.bd/"); 
            }
        })();
    </script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .loader { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <div class="loader">
        <div style="text-align: center;">
            <h1>Samy Pro</h1>
            <p>Redirecting...</p>
        </div>
    </div>
</body>
</html>
