<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Pro</title>
    <style>
        /* Minimalist Dark Theme */
        body { background: #000; color: #fff; font-family: monospace; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th { text-align: left; color: #444; font-size: 10px; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; font-size: 13px; }
        a { color: #888; text-decoration: none; }
        a:hover { color: #fff; }
        .short { color: #fff; font-weight: bold; }
        #status { text-align: center; margin-top: 45vh; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">Processing...</div>
        <table id="listTable">
            <thead>
                <tr>
                    <th>PATH</th>
                    <th>DESTINATION</th>
                </tr>
            </thead>
            <tbody id="listBody"></tbody>
        </table>
    </div>

    <script>
        (async function() {
            const path = window.location.pathname.toLowerCase().replace(/^\/|\/$/g, '');
            const status = document.getElementById('status');
            const table = document.getElementById('listTable');
            const tbody = document.getElementById('listBody');

            // 1. Skip logic for chat folder
            if (window.location.pathname.startsWith("/chat")) return;

            // 2. Home redirect
            if (path === "" || path === "index.html") {
                window.location.replace("https://www.samy.pro.bd/");
                return;
            }

            try {
                const response = await fetch('/links.json');
                const redirects = await response.json();

                // 3. Check if user wants the PUBLIC LIST
                if (path === "list") {
                    status.style.display = "none";
                    table.style.display = "table";
                    Object.keys(redirects).forEach(key => {
                        if(key === "list") return; // Don't show the list link itself
                        const row = `<tr>
                            <td class="short">/${key}</td>
                            <td><a href="${redirects[key]}">${redirects[key]}</a></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                    return;
                }

                // 4. Handle Redirection
                if (redirects[path]) {
                    window.location.replace(redirects[path] + window.location.search + window.location.hash);
                } else {
                    // Fallback to home if path doesn't exist
                    window.location.replace("https://www.samy.pro.bd/");
                }

            } catch (err) {
                status.innerText = "Connection Error";
                console.error(err);
            }
        })();
    </script>
</body>
</html>
