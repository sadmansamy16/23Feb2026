<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        var path = window.location.pathname.toLowerCase();
        var search = window.location.search;
        var hash = window.location.hash;
        
        // Remove slashes: "/2fa/" -> "2fa"
        var cleanPath = path.replace(/^\/|\/$/g, '');

        // --- MANAGE YOUR CUSTOM LINKS HERE ---
        var redirects = {
            "2fa": "https://s.samy.pro.bd/p/2fa.html",
            "qr": "https://s.samy.pro.bd/p/qr.html",
            "password": "https://vault.bitwarden.eu",
            "p": "https://vault.bitwarden.eu" // Example
        };

        var targetURL;

        if (redirects[cleanPath]) {
            // Use custom redirect if path matches
            targetURL = redirects[cleanPath] + search + hash;
        } else {
            // Default: Send to the main blog subdomain
            targetURL = "https://www.samy.pro.bd" + path + search + hash;
        }

        window.location.replace(targetURL);
    </script>
    
    <meta http-equiv="refresh" content="2; url=https://www.samy.pro.bd">
  </head>
  <body style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #333;">
    <p>Redirecting you to the requested page...</p>
    <p>If you are not redirected, <a href="https://www.samy.pro.bd" style="color: #007bff;">click here</a>.</p>
  </body>
