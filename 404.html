<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Pro</title>
    <style>
        /* Pure black, no cursor, no scrollbars */
        body { background: #000; margin: 0; overflow: hidden; }
    </style>
    <script type="text/javascript">
        (async function() {
            const path = window.location.pathname.toLowerCase();
            const cleanPath = path.replace(/^\/|\/$/g, '');
            
            // Skip logic for chat subfolder
            if (path.startsWith("/chat")) return;

            // Immediate redirect for root
            if (cleanPath === "" || cleanPath === "index.html") {
                window.location.replace("https://www.samy.pro.bd/");
                return;
            }

            try {
                const response = await fetch('/links.json');
                if (response.ok) {
                    const redirects = await response.json();
                    if (redirects[cleanPath]) {
                        window.location.replace(redirects[cleanPath] + window.location.search + window.location.hash);
                        return;
                    }
                }
            } catch (e) {
                console.error(e);
            }
            
            // If everything fails or link doesn't exist, stay on black or go to home
            window.location.replace("https://www.samy.pro.bd/");
        })();
    </script>
</head>
<body></body>
</html>
