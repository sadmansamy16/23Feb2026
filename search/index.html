<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <link href="https://samy.pro.bd/favicon.ico" rel="icon" type="image/x-icon" />
    <link rel="manifest" href="/search/manifest.json">
    <meta name="theme-color" content="#f5f5f7">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            padding: 40px 16px 24px 16px;
        }

        .workspace {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
        }

        .search-wrapper { 
            width: 100%; 
            position: relative;
        }

        .search-bar-container {
            display: flex;
            align-items: center;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4px 8px 4px 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            z-index: 100;
        }

        .search-bar-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
        }

        .search-icon {
            color: var(--text-muted);
            margin-right: 14px;
            display: flex;
            align-items: center;
        }

        .search-icon svg { width: 20px; height: 20px; fill: currentColor; }

        input { 
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px; 
            color: var(--text-main);
            outline: none;
            padding: 14px 0;
            width: 100%;
        }

        .go-btn { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; 
            transition: var(--transition);
        }

        .go-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .history-popup {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            margin-top: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            z-index: 99;
            overflow: hidden;
            display: none;
            padding: 8px 0;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .history-item:hover {
            background: var(--bg-color);
        }

        .history-content {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            font-size: 15px;
            flex: 1;
        }

        .history-clock-icon {
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .history-clock-icon svg { width: 16px; height: 16px; fill: currentColor; }

        .history-delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .history-delete-btn:hover {
            color: var(--danger-color);
        }

        .section-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            padding-left: 8px;
            letter-spacing: -0.1px;
        }

        .shortcuts-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        @media (max-width: 600px) {
            .shortcuts-grid { 
                grid-template-columns: repeat(4, 1fr); 
                gap: 8px; 
            }
        }

        .shortcut-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: var(--transition);
            border-radius: 16px;
            padding: 8px 4px;
            cursor: pointer;
        }

        .shortcut-item:hover {
            background: var(--surface-color);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .icon-container {
            width: 52px;
            height: 52px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .icon-container img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            border-radius: 4px;
        }

        .icon-fallback {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-color);
            background: rgba(0, 113, 227, 0.05);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .icon-plus {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-muted);
            background: var(--border-color);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }

        .shortcut-item:hover .icon-plus {
            background: rgba(0, 113, 227, 0.08);
            color: var(--accent-color);
        }

        .shortcut-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            border: none;
            font-size: 10px;
            font-weight: bold;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .shortcut-item:hover .delete-btn {
            display: flex;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: modalFadeIn 0.2s ease-out;
        }

        @keyframes modalFadeIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-card h3 {
            font-size: 18px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .modal-card input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background: var(--bg-color);
        }

        .modal-card input:focus {
            border-color: var(--accent-color);
            background: var(--surface-color);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-add { background: var(--accent-color); color: white; }
        .btn-cancel { background: var(--border-color); color: var(--text-main); }
        .modal-buttons button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <div class="search-icon">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
            <input type="text" id="urlInput" placeholder="Search Google or type URL" inputmode="search" autocomplete="off" spellcheck="false" autofocus>
            <button class="go-btn" onclick="navigateToSite()">
                <svg viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg>
            </button>
        </div>
        <div class="history-popup" id="historyPopup"></div>
    </div>

    <div class="section-container">
        <div class="section-title">Bookmarks</div>
        <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
    </div>

    <div class="section-container">
        <div class="section-title">Local</div>
        <div class="shortcuts-grid" id="localShortcutsGrid"></div>
    </div>
</div>

<div class="modal-overlay" id="addLinkModal">
    <div class="modal-card">
        <h3>Add Local Shortcut</h3>
        <input type="text" id="newTitle" placeholder="Site Name">
        <input type="text" id="newUrl" placeholder="URL (e.g., domain.com)">
        <input type="text" id="newImg" placeholder="Logo path (e.g. image.jpg or full URL)">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="toggleModal(false)">Cancel</button>
            <button class="btn-add" onclick="addShortcut()">Add</button>
        </div>
    </div>
</div>

<script>
    let jsonShortcuts = [];
    let localShortcuts = [];
    let searchHistory = [];

    const urlInput = document.getElementById('urlInput');
    const historyPopup = document.getElementById('historyPopup');

    function loadSearchHistory() {
        const storedHistory = localStorage.getItem('samy_search_history');
        if (storedHistory) searchHistory = JSON.parse(storedHistory);
    }

    function saveSearchHistory(query) {
        if (!query) return;
        searchHistory = searchHistory.filter(item => item !== query);
        searchHistory.unshift(query);
        if (searchHistory.length > 6) searchHistory.pop();
        localStorage.setItem('samy_search_history', JSON.stringify(searchHistory));
    }

    function showHistoryPopup() {
        if (searchHistory.length === 0) {
            historyPopup.style.display = 'none';
            return;
        }
        const currentVal = urlInput.value.trim().toLowerCase();
        const filtered = searchHistory.filter(item => item.toLowerCase().includes(currentVal));

        if (filtered.length === 0) {
            historyPopup.style.display = 'none';
            return;
        }

        historyPopup.innerHTML = '';
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.onmousedown = () => {
                urlInput.value = item;
                navigateToSite();
            };
            div.innerHTML = `
                <div class="history-content">
                    <div class="history-clock-icon">
                        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    </div>
                    <span>${item}</span>
                </div>
                <button class="history-delete-btn" onmousedown="deleteHistoryItem(event, '${item}')">×</button>
            `;
            historyPopup.appendChild(div);
        });
        historyPopup.style.display = 'block';
    }

    function deleteHistoryItem(event, item) {
        event.preventDefault();
        event.stopPropagation();
        searchHistory = searchHistory.filter(i => i !== item);
        localStorage.setItem('samy_search_history', JSON.stringify(searchHistory));
        showHistoryPopup();
        urlInput.focus();
    }

    urlInput.addEventListener('focus', showHistoryPopup);
    urlInput.addEventListener('input', showHistoryPopup);
    urlInput.addEventListener('blur', () => {
        setTimeout(() => historyPopup.style.display = 'none', 200);
    });

    async function loadShortcuts() {
        const localData = localStorage.getItem('samy_local_shortcuts');
        if (localData) {
            localShortcuts = JSON.parse(localData);
        }

        try {
            const [listResponse, imgResponse] = await Promise.all([
                fetch('/search/weblist.json'),
                fetch('/search/weblogo.json')
            ]);
            const webList = await listResponse.json();
            const webImgs = await imgResponse.json();
            
            jsonShortcuts = webList.map(item => {
                const name = item[0];
                return { name: name, url: item[1], img: webImgs[name] || "" };
            });
        } catch (error) {
            console.error('Error fetching baseline JSON config records:', error);
        }

        renderAllGrids();
    }

    function parseLogoUrl(imgString, isLocalGrid) {
        if (!imgString) return "";
        if (/^https?:\/\//i.test(imgString)) return imgString;
        if (!isLocalGrid && !imgString.startsWith('/')) return '/image/' + imgString;
        if (isLocalGrid && !imgString.startsWith('/')) return '/' + imgString;
        return imgString;
    }

    function createShortcutTile(item, index, isLocalGrid) {
        let logoUrl = parseLogoUrl(item.img, isLocalGrid);

        const anchor = document.createElement('a');
        anchor.className = 'shortcut-item';
        anchor.href = item.url;

        let iconContent = logoUrl 
            ? `<img src="${logoUrl}" alt="${item.name}" onerror="this.outerHTML=getFallbackHtml('${item.name}')">` 
            : getFallbackHtml(item.name);

        const deleteButtonHtml = isLocalGrid 
            ? `<button class="delete-btn" onclick="deleteLocalShortcut(event, ${index})">×</button>` 
            : '';

        anchor.innerHTML = `
            ${deleteButtonHtml}
            <div class="icon-container">${iconContent}</div>
            <div class="shortcut-title">${item.name}</div>
        `;
        return anchor;
    }

    function renderAllGrids() {
        const jsonGrid = document.getElementById('jsonShortcutsGrid');
        jsonGrid.innerHTML = '';
        jsonShortcuts.forEach((item, index) => {
            jsonGrid.appendChild(createShortcutTile(item, index, false));
        });

        const localGrid = document.getElementById('localShortcutsGrid');
        localGrid.innerHTML = '';
        localShortcuts.forEach((item, index) => {
            localGrid.appendChild(createShortcutTile(item, index, true));
        });

        const addTile = document.createElement('div');
        addTile.className = 'shortcut-item';
        addTile.onclick = () => toggleModal(true);
        addTile.innerHTML = `
            <div class="icon-container">
                <div class="icon-plus">+</div>
            </div>
            <div class="shortcut-title">Add Link</div>
        `;
        localGrid.appendChild(addTile);
    }

    function getFallbackHtml(title) {
        return `<div class="icon-fallback">${title.trim().charAt(0)}</div>`;
    }

    function toggleModal(show) {
        const modal = document.getElementById('addLinkModal');
        modal.style.display = show ? 'flex' : 'none';
        if (!show) {
            document.getElementById('newTitle').value = '';
            document.getElementById('newUrl').value = '';
            document.getElementById('newImg').value = '';
        }
    }

    function addShortcut() {
        const name = document.getElementById('newTitle').value.trim();
        let url = document.getElementById('newUrl').value.trim();
        const img = document.getElementById('newImg').value.trim();

        if (!name || !url) return;
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

        localShortcuts.push({ name, url, img });
        localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts));
        renderAllGrids();
        toggleModal(false);
    }

    function deleteLocalShortcut(event, index) {
        event.preventDefault();
        event.stopPropagation();
        localShortcuts.splice(index, 1);
        localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts));
        renderAllGrids();
    }

    function navigateToSite() {
        const input = urlInput.value.trim();
        if (!input) return;

        saveSearchHistory(input);
        const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i;

        if (urlPattern.test(input)) {
            let url = input;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            window.location.href = url;
        } else {
            window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(input);
        }
    }

    urlInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") navigateToSite();
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/search/sw.js')
                .then(reg => console.log('PWA Service Worker Registered Successfully:', reg.scope))
                .catch(err => console.error('SW Registration Failed:', err));
        });
    }

    loadSearchHistory();
    document.addEventListener("DOMContentLoaded", loadShortcuts);
</script>
</body>
</html>
