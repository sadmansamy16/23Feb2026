<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Search</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f5f5f7; /* Light neutral background */
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            padding: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { color: #333; margin-bottom: 20px; font-size: 1.5rem; }

        input { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }

        input:focus { border-color: #007bff; }

        button { 
            width: 100%; 
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { background: #0056b3; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h2>Go to Website</h2>
    <input type="url" id="urlInput" placeholder="Enter address (e.g. google.com)" inputmode="url">
    <button onclick="navigateToSite()">Go Now</button>
</div>

<script>
    function navigateToSite() {
        let url = document.getElementById('urlInput').value.trim();
        if (!url) return;

        // Force lowercase and check for protocol
        if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
        }
        window.location.href = url;
    }

    // Enter key support
    document.getElementById('urlInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") navigateToSite();
    });
</script>

</body>
</html>
