<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samy Search</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Enter Website Address</h2>
    <input type="text" id="urlInput" placeholder="example.com">
    <button onclick="navigateToSite()">Go</button>
</div>

<script>
    function navigateToSite() {
        let url = document.getElementById('urlInput').value.trim();
        
        if (url === "") return;

        // Check if the user included http or https
        if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
        }
        
        window.location.href = url;
    }

    // Allow pressing "Enter" key to go
    document.getElementById('urlInput').addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            navigateToSite();
        }
    });
</script>

</body>
</html>
