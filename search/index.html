<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <style>
        :root { --bg-color: #f5f5f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); padding: 40px 16px; }

        .shortcuts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

        /* REMOVED ALL ANIMATIONS AND CLICK EFFECTS */
        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #1d1d1f;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: none !important;
        }

        /* FULL LOGO FILL: No background, image crops to fit */
        .icon-container {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
        }

        .icon-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This makes it fill the box entirely */
            display: block;
        }

        .shortcut-title { font-size: 11px; width: 100%; text-align: center; }

        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; }
        .modal-card { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 300px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; background: #0071e3; color: white; }
    </style>
</head>
<body>

<div class="shortcuts-grid" id="localShortcutsGrid"></div>

<div class="modal-overlay" id="addLinkModal">
    <div class="modal-card">
        <h3>Add Shortcut</h3>
        <input type="text" id="newTitle" placeholder="Name">
        <input type="text" id="newUrl" placeholder="URL">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="addShortcut()">Save</button>
        <button onclick="toggleModal(false)" style="background:#ddd; color:black;">Cancel</button>
    </div>
</div>

<script>
    let localShortcuts = JSON.parse(localStorage.getItem('localShortcuts') || '[]');
    let db = null;

    const request = indexedDB.open("SamySearchDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("images", { keyPath: "id" });
    request.onsuccess = e => { db = e.target.result; render(); };

    function render() {
        const grid = document.getElementById('localShortcutsGrid');
        grid.innerHTML = '';
        
        localShortcuts.forEach((item, index) => {
            const div = document.createElement('a');
            div.className = 'shortcut-item';
            div.href = item.url;
            div.innerHTML = `
                <div class="icon-container" id="icon-${index}"></div>
                <div class="shortcut-title">${item.name}</div>
            `;
            grid.appendChild(div);

            if (item.img.startsWith('db_')) {
                const tx = db.transaction("images").objectStore("images").get(item.img);
                tx.onsuccess = () => {
                    if (tx.result) document.getElementById(`icon-${index}`).innerHTML = `<img src="${tx.result.data}">`;
                };
            }
        });

        grid.innerHTML += `<div class="shortcut-item" onclick="toggleModal(true)">
            <div class="icon-container" style="background:#eee;"><div style="font-size:24px;">+</div></div>
            <div class="shortcut-title">Add</div>
        </div>`;
    }

    function addShortcut() {
        const name = document.getElementById('newTitle').value;
        const url = document.getElementById('newUrl').value;
        const file = document.getElementById('fileInput').files[0];
        const id = 'db_' + Date.now();

        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                db.transaction("images", "readwrite").objectStore("images").put({ id, data: e.target.result });
                localShortcuts.push({ name, url, img: id });
                localStorage.setItem('localShortcuts', JSON.stringify(localShortcuts));
                render();
            };
            reader.readAsDataURL(file);
        }
        toggleModal(false);
    }

    function toggleModal(show) { document.getElementById('addLinkModal').style.display = show ? 'flex' : 'none'; }
</script>
</body>
</html>
