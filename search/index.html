<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <link href="https://samy.pro.bd/favicon.ico" rel="icon" type="image/x-icon" />
    <meta name="theme-color" content="#f5f5f7">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 40px 16px 24px 16px;
        }

        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 28px; align-items: center; }
        .search-wrapper { width: 100%; position: relative; }
        .search-bar-container { display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 24px; padding: 4px 8px; box-shadow: var(--shadow); position: relative; z-index: 100; }
        
        input { flex: 1; border: none; background: transparent; font-size: 17px; color: var(--text-main); outline: none; padding: 14px 0; width: 100%; }
        
        /* Fixed Shortcut Tiles to prevent visual changes */
        .shortcut-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main) !important;
            outline: none !important;
            border-radius: 16px;
            padding: 8px 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            /* Removed hover/transform effects to keep them static */
        }

        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .icon-container img { width: 26px; height: 26px; object-fit: contain; border-radius: 4px; }
        .shortcut-title { font-size: 11px; font-weight: 500; color: var(--text-main); text-align: center; width: 100%; }
        
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        @media (max-width: 600px) { .shortcuts-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; } }
    </style>
</head>
<body>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <input type="text" id="urlInput" placeholder="Search Google or type URL" autocomplete="off">
        </div>
    </div>
    <div class="section-container">
        <div class="shortcuts-grid" id="shortcutsGrid"></div>
    </div>
</div>

<script>
    // Simplified navigation
    const urlInput = document.getElementById('urlInput');
    urlInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            const input = urlInput.value.trim();
            if (!input) return;
            window.location.href = input.includes('.') ? (input.startsWith('http') ? input : 'https://' + input) : "https://www.google.com/search?q=" + encodeURIComponent(input);
        }
    });
</script>
</body>
</html>
