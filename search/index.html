<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color); 
            padding: 40px 16px;
        }

        /* REMOVED CLICK EFFECTS: No transitions or transforms */
        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* NEW LOGO CROPPING: Forces square fill */
        .icon-container {
            width: 52px;
            height: 52px;
            background: #eee;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
        }

        .icon-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This crops the image to fill the box */
        }

        .icon-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e0e0e0;
            font-weight: 600;
        }

        .shortcut-title {
            font-size: 11px;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- UI Elements --- */
        .shortcuts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; }
        .modal-card { background: white; padding: 20px; border-radius: 20px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="shortcuts-grid" id="localShortcutsGrid"></div>

<div class="modal-overlay" id="addLinkModal">
    <div class="modal-card">
        <h3>Add Link</h3>
        <input type="text" id="newTitle" placeholder="Name">
        <input type="text" id="newUrl" placeholder="URL">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="addShortcut()">Save</button>
        <button onclick="toggleModal(false)">Cancel</button>
    </div>
</div>

<script>
    let localShortcuts = JSON.parse(localStorage.getItem('localShortcuts') || '[]');
    let db = null;

    // Initialize Database
    const request = indexedDB.open("SamySearchDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("images", { keyPath: "id" });
    request.onsuccess = e => { db = e.target.result; render(); };

    function render() {
        const grid = document.getElementById('localShortcutsGrid');
        grid.innerHTML = '';
        
        localShortcuts.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'shortcut-item';
            div.innerHTML = `
                <div class="icon-container" id="icon-${index}"></div>
                <div class="shortcut-title">${item.name}</div>
            `;
            grid.appendChild(div);

            if (item.img.startsWith('db_')) {
                const tx = db.transaction("images").objectStore("images").get(item.img);
                tx.onsuccess = () => {
                    if (tx.result) document.getElementById(`icon-${index}`).innerHTML = `<img src="${tx.result.data}">`;
                };
            }
        });

        grid.innerHTML += `<div class="shortcut-item" onclick="toggleModal(true)">
            <div class="icon-container"><div class="icon-fallback">+</div></div>
            <div class="shortcut-title">Add</div>
        </div>`;
    }

    function addShortcut() {
        const name = document.getElementById('newTitle').value;
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        const id = 'db_' + Date.now();

        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                db.transaction("images", "readwrite").objectStore("images").put({ id, data: e.target.result });
                localShortcuts.push({ name, img: id });
                localStorage.setItem('localShortcuts', JSON.stringify(localShortcuts));
                render();
            };
            reader.readAsDataURL(file);
        }
        toggleModal(false);
    }

    function toggleModal(show) { document.getElementById('addLinkModal').style.display = show ? 'flex' : 'none'; }
</script>
</body>
</html>
