<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Search</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f7; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        
        .shortcut { 
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: #1d1d1f; cursor: pointer;
        }

        .icon { 
            width: 55px; height: 55px; border-radius: 15px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .name { font-size: 11px; margin-top: 8px; text-align: center; }
        
        .modal { 
            position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); 
            display: none; justify-content: center; align-items: center; z-index: 999;
        }
    </style>
</head>
<body>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div style="background:white; padding:20px; border-radius:15px; width:250px;">
        <input type="text" id="name" placeholder="Name" style="width:100%; margin-bottom:10px;"><br>
        <input type="text" id="url" placeholder="URL" style="width:100%; margin-bottom:10px;"><br>
        <input type="file" id="file" accept="image/*" style="margin-bottom:10px;"><br>
        <button onclick="save()" style="width:100%; padding:10px;">Add Shortcut</button>
    </div>
</div>

<script>
    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const list = JSON.parse(localStorage.getItem('myLinks') || '[]');
        
        list.forEach((item, idx) => {
            let a = document.createElement('a');
            a.className = 'shortcut';
            a.href = item.url;
            a.innerHTML = `
                <div class="icon"><img src="${item.img}"></div>
                <div class="name">${item.name}</div>
            `;
            grid.appendChild(a);
        });

        grid.innerHTML += `<div class="shortcut" onclick="document.getElementById('modal').style.display='flex'">
            <div class="icon" style="background:#ddd; font-size:20px;">+</div>
            <div class="name">Add</div>
        </div>`;
    }

    function save() {
        const name = document.getElementById('name').value;
        const url = document.getElementById('url').value;
        const file = document.getElementById('file').files[0];
        const reader = new FileReader();

        reader.onload = e => {
            const list = JSON.parse(localStorage.getItem('myLinks') || '[]');
            list.push({ name, url, img: e.target.result });
            localStorage.setItem('myLinks', JSON.stringify(list));
            document.getElementById('modal').style.display = 'none';
            render();
        };
        reader.readAsDataURL(file);
    }

    render();
</script>
</body>
</html>
