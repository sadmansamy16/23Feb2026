<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Generator | Samy</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; background: #222; color: #00ff00; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 0.9rem; word-break: break-all; display: none; cursor: pointer; }
        .tip { font-size: 0.8rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generate Short Link</h2>
    <input type="url" id="urlInput" placeholder="https://example.com" required>
    <button onclick="generateLink()">Generate JSON Line</button>
    <div id="result" title="Click to copy"></div>
    <p class="tip">Copy the green text and paste it into your <b>shorturl.json</b></p>
</div>

<script>
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';

    async function generateLink() {
        const url = document.getElementById('urlInput').value;
        if (!url) return alert("Please enter a URL");

        let existingKeys = [];
        try {
            // Fetch your existing shorturl.json to prevent duplicates
            const response = await fetch('/shorturl.json');
            const data = await response.json();
            existingKeys = Object.keys(data);
        } catch (e) { console.log("New file detected."); }

        let code = '';
        let isUnique = false;

        while (!isUnique) {
            code = '';
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            if (!existingKeys.includes(code)) isUnique = true;
        }

        const jsonLine = `"${code}": "${url}",`;
        const resultDiv = document.getElementById('result');
        resultDiv.innerText = jsonLine;
        resultDiv.style.display = 'block';
        
        // Auto-copy to clipboard
        navigator.clipboard.writeText(jsonLine);
        alert("Generated and copied to clipboard!");
    }
</script>
</body>
</html>
