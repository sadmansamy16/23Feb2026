<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy's Chat</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #e7ebf0; margin: 0; font-family: -apple-system, system-ui, Roboto, sans-serif; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 600px; height: 100vh; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        /* Restored your original font size and bubble padding */
        .bubble { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 18px; line-height: 1.5; color: #000; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .right { align-self: flex-end; background-color: #effdde; border-bottom-right-radius: 4px; }
        .left { align-self: flex-start; background-color: #ffffff; border-bottom-left-radius: 4px; }
        .bubble a { color: #00488d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat" class="chat-container"></div>
    <script>
        let isFirstLoad = true; // Variable to control the initial view

        function linkify(text) {
    // NEW: Converts [Movie](https://site.com) into <a href="https://site.com">Movie</a>
    const hiddenLinkPattern = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;
    text = text.replace(hiddenLinkPattern, '<a href="$2" target="_blank">$1</a>');

    const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
    const wwwPattern = /(^|[^\/])(www\.[\S]+(\b|$))/gim;
    
    // MODIFIED: Only turns raw URLs into links if they aren't already part of a hidden link
    return text.replace(urlPattern, (match) => text.includes('href="' + match) ? match : `<a href="${match}" target="_blank">${match}</a>`)
               .replace(wwwPattern, '$1<a href="http://$2" target="_blank">$2</a>');
}


        async function loadMessages() {
            try {
                const chat = document.getElementById('chat');
                
                // Determine if the user is currently at the bottom before we refresh
                const isAtBottom = chat.scrollHeight - chat.clientHeight <= chat.scrollTop + 50;

                const response = await fetch('./messages.json?t=' + Date.now());
                const messages = await response.json();
                
                chat.innerHTML = ''; 
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    const sideClass = (msg[1] === 'r') ? 'right' : 'left';
                    div.className = 'bubble ' + sideClass;
                    div.innerHTML = linkify(msg[0]);
                    chat.appendChild(div);
                });

                if (isFirstLoad) {
                    // On the very first open, force the scroll to the top
                    chat.scrollTop = 0;
                    isFirstLoad = false;
                } else if (isAtBottom) {
                    // On auto-refresh, only scroll down if the user was already at the bottom
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (e) { console.log("Updating..."); }
        }

        loadMessages();
        setInterval(loadMessages, 10000);

        // PWA Installation Script
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
