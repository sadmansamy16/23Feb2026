<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy's Chat</title>
    <style>
        body { background-color: #e7ebf0; margin: 0; font-family: -apple-system, system-ui, Roboto, sans-serif; display: flex; justify-content: center; }
        
        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            height: 100vh; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-blend-mode: overlay; 
        }

        .bubble { 
            max-width: 80%; 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 18px; 
            line-height: 1.5; 
            color: #000; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
            word-wrap: break-word; 
        }

        /* This moves "isMe: true" messages to the right */
        .right { 
            align-self: flex-end; 
            background-color: #effdde; 
            border-bottom-right-radius: 4px; 
        }

        /* This keeps "isMe: false" messages on the left */
        .left { 
            align-self: flex-start; 
            background-color: #ffffff; 
            border-bottom-left-radius: 4px; 
        }

        .bubble a { color: #00488d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat" class="chat-container"></div>

    <script>
        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            const wwwPattern = /(^|[^\/])(www\.[\S]+(\b|$))/gim;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>').replace(wwwPattern, '$1<a href="http://$2" target="_blank">$2</a>');
        }

        async function loadMessages() {
            try {
                const response = await fetch('./messages.json?t=' + Date.now());
                const messages = await response.json();
                const chat = document.getElementById('chat');
                
                chat.innerHTML = ''; 

                messages.forEach(msg => {
                    const div = document.createElement('div');
                    // Check if isMe is true to apply the 'right' class
                    div.className = 'bubble ' + (msg.isMe ? 'right' : 'left');
                    div.innerHTML = linkify(msg.text);
                    chat.appendChild(div);
                });

                // Auto-scroll to bottom
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { 
                console.log("Updating messages..."); 
            }
        }

        loadMessages();
        // Check for new messages every 10 seconds
        setInterval(loadMessages, 10000);
    </script>
</body>
</html>
