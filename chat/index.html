<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy's Chat</title>
    <style>
        /* Telegram White Theme Styling */
        body { 
            background-color: #e7ebf0; 
            margin: 0; 
            font-family: -apple-system, system-ui, Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
        }

        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            height: 100vh; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            /* Telegram Background Pattern */
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-blend-mode: overlay; 
        }

        .bubble { 
            max-width: 80%; 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 18px; /* Large text size */
            line-height: 1.5; 
            color: #000; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
            word-wrap: break-word; 
        }

        /* Right Side (r) - Greenish */
        .right { 
            align-self: flex-end; 
            background-color: #effdde; 
            border-bottom-right-radius: 4px; 
        }

        /* Left Side (l) - White */
        .left { 
            align-self: flex-start; 
            background-color: #ffffff; 
            border-bottom-left-radius: 4px; 
        }

        .bubble a { 
            color: #00488d; 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="chat" class="chat-container"></div>

    <script>
        // Function to make URLs clickable automatically
        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            const wwwPattern = /(^|[^\/])(www\.[\S]+(\b|$))/gim;
            return text
                .replace(urlPattern, '<a href="$1" target="_blank">$1</a>')
                .replace(wwwPattern, '$1<a href="http://$2" target="_blank">$2</a>');
        }

        async function loadMessages() {
            try {
                // Fetch the messages.json file
                const response = await fetch('./messages.json?t=' + Date.now());
                const messages = await response.json();
                const chat = document.getElementById('chat');
                
                chat.innerHTML = ''; // Clear current view

                messages.forEach(msg => {
                    const div = document.createElement('div');
                    
                    // msg[0] is the text, msg[1] is the side ('l' or 'r')
                    const textContent = msg[0];
                    const sidePreference = msg[1];

                    // Set class based on the second item in the JSON array
                    const sideClass = (sidePreference === 'r') ? 'right' : 'left';
                    
                    div.className = 'bubble ' + sideClass;
                    div.innerHTML = linkify(textContent);
                    
                    chat.appendChild(div);
                });

                // Scroll to the bottom automatically
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { 
                console.log("Waiting for JSON file to update..."); 
            }
        }

        // Initial load
        loadMessages();
        
        // Refresh every 10 seconds
        setInterval(loadMessages, 10000);
    </script>
</body>
</html>
