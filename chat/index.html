<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy's Chat</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background-color: #e7ebf0; 
            margin: 0; 
            font-family: -apple-system, system-ui, Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
        }
        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            height: 100vh; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-blend-mode: overlay;
            scroll-behavior: smooth;
        }
        /* Hidden scrollbar for cleaner look */
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .bubble { 
            position: relative;
            max-width: 80%; 
            padding: 10px 15px; 
            border-radius: 15px; 
            font-size: 16px; 
            line-height: 1.4; 
            color: #000; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.15); 
            word-wrap: break-word; 
        }
        .right { 
            align-self: flex-end; 
            background-color: #effdde; 
            border-bottom-right-radius: 4px; 
        }
        .left { 
            align-self: flex-start; 
            background-color: #ffffff; 
            border-bottom-left-radius: 4px; 
        }
        .bubble a { 
            color: #00488d; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <div id="chat" class="chat-container"></div>

    <script>
        function linkify(text) {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            const wwwPattern = /(^|[^\/])(www\.[\S]+(\b|$))/gim;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>')
                       .replace(wwwPattern, '$1<a href="http://$2" target="_blank">$2</a>');
        }

        async function loadMessages() {
            const chat = document.getElementById('chat');
            
            // Check if user is near the bottom before updating
            const isAtBottom = chat.scrollHeight - chat.clientHeight <= chat.scrollTop + 100;

            try {
                const response = await fetch('./messages.json?t=' + Date.now());
                const messages = await response.json();
                
                chat.innerHTML = ''; 

                // Loads messages in the order they appear in the JSON (0, 1, 2...)
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    const sideClass = (msg[1] === 'r') ? 'right' : 'left';
                    div.className = 'bubble ' + sideClass;
                    div.innerHTML = linkify(msg[0]);
                    chat.appendChild(div);
                });

                // Only auto-scroll to the newest message if the user is already at the bottom
                if (isAtBottom) {
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (e) { 
                console.log("Updating or connection error..."); 
            }
        }

        // Initial load
        loadMessages();
        
        // Refresh every 10 seconds
        setInterval(loadMessages, 10000);

        // PWA Installation
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
            });
        }
    </script>
</body>
</html>
