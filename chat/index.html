<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamyChat</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #e7ebf0;
            --bubble-right: #effdde;
            --bubble-left: #ffffff;
            --link-color: #00488d;
        }

        body { 
            background-color: var(--bg-color); 
            margin: 0; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
        }

        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            height: 100vh; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-blend-mode: overlay;
            scroll-behavior: smooth; 
        }

        .bubble { 
            max-width: 85%; 
            padding: 10px 16px; 
            border-radius: 18px; 
            font-size: 16px; 
            line-height: 1.4; 
            color: #000; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            word-wrap: break-word;
            position: relative;
            font-weight: 500;
            white-space: pre-wrap; 
        }

        .right { align-self: flex-end; background-color: var(--bubble-right); border-bottom-right-radius: 4px; }
        .left { align-self: flex-start; background-color: var(--bubble-left); border-bottom-left-radius: 4px; }
        
        /* Middle System Messages */
        .middle {
            align-self: center;
            background-color: rgba(0, 0, 0, 0.25);
            color: #fff;
            border-radius: 12px;
            padding: 5px 12px;
            font-size: 13px;
            margin: 5px 0;
            box-shadow: none;
            text-align: center;
        }

        .bubble a { color: var(--link-color); text-decoration: none; font-weight: 700; white-space: normal; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="chat" class="chat-container"></div>

    <script>
        let isFirstLoad = true;

        function linkify(text) {
            // Escape HTML to prevent XSS
            const div = document.createElement('div');
            div.textContent = text;
            let escapedText = div.innerHTML;

            // Handle Markdown style links
            escapedText = escapedText.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Handle raw URLs
            const urlPattern = /(https?:\/\/[^\s<]+)/gi;
            return escapedText.replace(urlPattern, (match) => {
                if (escapedText.includes(`href="${match}"`)) return match;
                return `<a href="${match}" target="_blank">${match}</a>`;
            });
        }

        async function loadMessages() {
            try {
                const chat = document.getElementById('chat');
                const isAtBottom = chat.scrollHeight - chat.clientHeight <= chat.scrollTop + 60;

                const response = await fetch('./chat.json?t=' + Date.now());
                if (!response.ok) throw new Error("File not found");
                
                const messages = await response.json();
                
                chat.innerHTML = ''; 
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    const typeMap = { 'r': 'right', 'l': 'left', 'm': 'middle' };
                    div.className = 'bubble ' + (typeMap[msg[1]] || 'left');
                    div.innerHTML = linkify(msg[0]);
                    chat.appendChild(div);
                });

                if (isFirstLoad) {
                    chat.scrollTop = chat.scrollHeight; 
                    isFirstLoad = false;
                } else if (isAtBottom) {
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (e) { console.log("Waiting for update..."); }
        }

        loadMessages();
        setInterval(loadMessages, 10000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
