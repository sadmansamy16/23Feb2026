<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamyChat</title>
    <style>
        :root { --bg-color: #e7ebf0; --tg-blue: #2481cc; }
        body { background-color: var(--bg-color); margin: 0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .main-wrapper { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .chat-container { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .bubble { max-width: 85%; padding: 10px 16px; border-radius: 18px; font-size: 16px; position: relative; white-space: pre-wrap; word-wrap: break-word; }
        .right { align-self: flex-end; background-color: #effdde; }
        .left { align-self: flex-start; background-color: #ffffff; }

        /* The New Visible Separator */
        .separator {
            text-align: center; margin: 15px 0; position: relative; color: #888; font-size: 12px; font-weight: bold;
        }
        .separator::before, .separator::after {
            content: ""; position: absolute; top: 50%; width: 35%; height: 2px; background: #cbd2d9;
        }
        .separator::before { left: 0; }
        .separator::after { right: 0; }

        .input-bar { 
            padding: 10px; background: #e7ebf0; display: flex; gap: 10px; align-items: center; 
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div id="chat" class="chat-container"></div>
        <div class="input-bar">
            <input type="text" id="chat-input" style="flex:1; padding: 10px; border-radius: 20px; border:none;" placeholder="Message...">
            <button onclick="sendLiveChatMessage()" style="width: 40px; height: 40px; border-radius: 50%; background: var(--tg-blue); border:none; color:white;">➤</button>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = "6241716507:AAFT2sN3al_EAwOtY3IlypgPgTTT2B0hXSE"; 
        const TELEGRAM_CHAT_ID = "6003288214"; 

        async function loadMessages() {
            const chat = document.getElementById('chat');
            const scrollPos = chat.scrollTop; // Save current position

            let fileMessages = [];
            try {
                const response = await fetch('./chat.json?t=' + Date.now());
                if (response.ok) fileMessages = await response.json();
            } catch (e) {}
            
            const localMessages = JSON.parse(localStorage.getItem("samy_chat_cache")) || [];
            
            chat.innerHTML = ''; 
            fileMessages.forEach(m => appendBubble(chat, m));

            if (fileMessages.length > 0 && localMessages.length > 0) {
                const sep = document.createElement('div');
                sep.className = 'separator'; sep.innerText = "NEW MESSAGES";
                chat.appendChild(sep);
            }

            localMessages.forEach(m => appendBubble(chat, m));
            chat.scrollTop = scrollPos; // Restore position to prevent "jumping"
        }

        function appendBubble(container, msg) {
            const div = document.createElement('div');
            div.className = 'bubble ' + (msg[1] === 'r' ? 'right' : 'left');
            div.innerText = msg[0];
            container.appendChild(div);
        }

        async function sendLiveChatMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;

            const messages = JSON.parse(localStorage.getItem("samy_chat_cache")) || [];
            messages.push([input.value, 'r', Date.now()]);
            localStorage.setItem("samy_chat_cache", JSON.stringify(messages));
            
            input.value = '';
            loadMessages();
            // Force scroll to bottom ONLY when sending new message
            setTimeout(() => { document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight; }, 100);
        }

        loadMessages();
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>
