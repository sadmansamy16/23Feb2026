name: Update JSON
on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update file
        run: |
          echo '${{ github.event.client_payload.data }}' > data.json

      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update data via API"
          file_pattern: data.json
