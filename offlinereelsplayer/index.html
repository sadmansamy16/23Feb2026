<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Offline Reels</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #setup-overlay { position: absolute; z-index: 999; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; }
        #load-folder { padding: 15px 30px; font-size: 18px; background: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #000; }
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <button id="load-folder">Select Reels Folder</button>
        <p style="margin-top: 20px; color: #888;">Pick the folder containing your MP4s</p>
    </div>

    <div class="swiper">
        <div class="swiper-wrapper" id="video-wrapper"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // REGISTER SERVICE WORKER FOR PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("Samy Player: Offline Mode Ready");
            });
        }

        let swiper;
        const videoWrapper = document.getElementById('video-wrapper');
        const loadBtn = document.getElementById('load-folder');
        const overlay = document.getElementById('setup-overlay');

        function initSwiper() {
            swiper = new Swiper('.swiper', {
                direction: 'vertical',
                mousewheel: true,
                on: {
                    slideChange: function () {
                        document.querySelectorAll('video').forEach(v => { v.pause(); v.currentTime = 0; });
                        const activeVideo = document.querySelector('.swiper-slide-active video');
                        if (activeVideo) activeVideo.play();
                    }
                }
            });
        }

        loadBtn.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.webkitdirectory = true; 
            input.multiple = true;
            
            input.onchange = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                overlay.style.display = 'none';

                files.sort((a, b) => a.name.localeCompare(b.name)); // Sort by filename

                files.forEach(file => {
                    if (file.type.startsWith('video/')) {
                        const url = URL.createObjectURL(file);
                        const slide = document.createElement('div');
                        slide.className = 'swiper-slide';
                        
                        const video = document.createElement('video');
                        video.src = url;
                        video.playsInline = true;
                        video.onended = () => { if (!swiper.isEnd) swiper.slideNext(); };

                        let lastTap = 0;
                        video.onclick = (event) => {
                            const now = Date.now();
                            if (now - lastTap < 300) {
                                const rect = video.getBoundingClientRect();
                                const x = event.clientX - rect.left;
                                if (x < rect.width / 2) video.currentTime -= 10;
                                else video.currentTime += 10;
                            } else {
                                setTimeout(() => {
                                    if (Date.now() - lastTap >= 300) {
                                        video.paused ? video.play() : video.pause();
                                    }
                                }, 300);
                            }
                            lastTap = now;
                        };

                        slide.appendChild(video);
                        videoWrapper.appendChild(slide);
                    }
                });
                initSwiper();
                const firstVideo = document.querySelector('video');
                if (firstVideo) firstVideo.play();
            };
            input.click();
        };
    </script>
</body>
</html>
