<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarker Communication Web Dialer</title>
    
    <!-- Mizu WebPhone Main API Library -->
    <script src="https://www.mizu-voip.com/Portals/0/Files/webphone/webphone.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 400px; 
            margin: 50px auto; 
            padding: 30px; 
            border: 1px solid #e0e0e0; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); 
            background-color: #ffffff; 
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 22px; font-weight: 600; }
        label { font-size: 13px; color: #34495e; font-weight: 500; display: block; margin-top: 12px; }
        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            box-sizing: border-box; 
            border-radius: 6px; 
            border: 1px solid #cccccc; 
            font-size: 14px; 
            transition: all 0.3s ease;
        }
        input:focus, select:focus { border-color: #3498db; outline: none; box-shadow: 0 0 4px rgba(52,152,219,0.3); }
        button { background-color: #2c3e50; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 15px; }
        button:hover { background-color: #1a252f; }
        .call-controls { display: none; margin-top: 25px; border-top: 2px dashed #e0e0e0; padding-top: 20px; }
        #status { font-weight: 600; color: #7f8c8d; text-align: center; margin-top: 20px; font-size: 14px; padding: 8px; border-radius: 4px; background-color: #f8f9fa; }
        .hint { font-size: 11px; color: #95a5a6; margin-top: -4px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <h2>Sarker Comm Dialer</h2>
    
    <!-- Google/Brave Password Manager ট্র্রিগার করার জন্য স্ট্যান্ডার্ড ফর্ম -->
    <form id="sipLoginForm" onsubmit="connectSarkerSIP(event)">
        
        <label for="serverSelect">Quick Recommendation:</label>
        <select id="serverSelect" onchange="appendServerDomain()">
            <option value="">-- Choose to Auto-Fill Server --</option>
            <option value="@sip.sarkercommunication.com">Sarker Communication (Default)</option>
        </select>

        <label for="username">SIP Identity (Username & Server):</label>
        <input type="text" id="username" name="username" placeholder="e.g. 09649516171@sip.sarkercommunication.com" required autocomplete="username">
        <div class="hint">Format: your_number@server_address</div>
        
        <label for="password">SIP Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter Your SIP Password" required autocomplete="current-password">
        
        <button type="submit">Login & Save Credentials</button>
    </form>

    <!-- কল করার ইন্টারফেস (লগইন সফল হলে দৃশ্যমান হবে) -->
    <div id="callSection" class="call-controls">
        <h3 style="margin-top: 0; color: #2c3e50; font-size: 16px;">Make a Call</h3>
        <input type="text" id="destination" placeholder="Enter Number (e.g., 017xxxxxxxx)">
        <button onclick="startCall()" style="background-color: #2ecc71;">Call</button>
        <button onclick="stopCall()" style="background-color: #e74c3c; margin-top: 5px;">Hang Up</button>
    </div>

    <p id="status">Status: Disconnected</p>

    <script>
        let isConnected = false;

        // ড্রপডাউন থেকে সিলেক্ট করলে ডোমেইনটি ইউজারনেমের শেষে যুক্ত হবে
        function appendServerDomain() {
            const select = document.getElementById('serverSelect');
            const usernameInput = document.getElementById('username');
            
            if (select.value !== "") {
                let currentVal = usernameInput.value.split('@')[0];
                if(currentVal === "") currentVal = "09649516171"; // ডেমো নাম্বার
                usernameInput.value = currentVal + select.value;
            }
        }

        // Mizu WebPhone এর ইভেন্ট লিসেনার সেটআপ
        window.onload = function() {
            // অ্যাপ্লিকেশনের কানেকশন স্টেট পরিবর্তন ট্র্যাকিং
            webphone_api.onAppStateChange(function (state) {
                const statusText = document.getElementById('status');
                if (state === 'loaded') {
                    statusText.innerText = "Status: Ready to connect";
                } else if (state === 'registered') {
                    statusText.innerText = "Status: Connected to Sarker Network!";
                    statusText.style.color = "#2ecc71";
                    statusText.style.backgroundColor = "#e8f8f5";
                    document.getElementById('callSection').style.display = 'block';
                    isConnected = true;
                } else if (state === 'failed' || state === 'stopped') {
                    statusText.innerText = "Status: Connection Failed / Disconnected";
                    statusText.style.color = "#e74c3c";
                    statusText.style.backgroundColor = "#fdebd0";
                    document.getElementById('callSection').style.display = 'none';
                    isConnected = false;
                }
            });

            // কলের স্টেট পরিবর্তন ট্র্যাকিং
            webphone_api.onCallStateChange(function (status, direction, peer, line) {
                const statusText = document.getElementById('status');
                if (status === 'setup') {
                    statusText.innerText = "Status: Calling...";
                    statusText.style.color = "#3498db";
                } else if (status === 'connected') {
                    statusText.innerText = "Status: In Call (Connected)";
                    statusText.style.color = "#2ecc71";
                } else if (status === 'disconnected') {
                    statusText.innerText = "Status: Connected to Sarker Network!";
                    statusText.style.color = "#2ecc71";
                }
            });
        };

        function connectSarkerSIP(event) {
            event.preventDefault(); // ফর্ম সাবমিটে পেজ রিফ্রেশ আটকানো
            
            const fullIdentity = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const statusText = document.getElementById('status');

            if (!fullIdentity.includes('@')) {
                statusText.innerText = "Status: Error - Use number@server format";
                statusText.style.color = "#e74c3c";
                return;
            }

            const parts = fullIdentity.split('@');
            const username = parts[0];       // আপনার আইপি নম্বর
            const serverDomain = parts[1];   // সর্কার কমিউনিকেশনের ডোমেইন

            statusText.innerText = "Status: Routing through Mizu Network...";
            statusText.style.color = "#3498db";
            statusText.style.backgroundColor = "#ebf5fb";

            // Mizu API প্যারামিটার কনফিগারেশন (যা Mizudroid অ্যাপের মতো আচরণ করবে)
            webphone_api.setparameter('gatewayaddress', serverDomain); // আসল ডেস্টিনেশন UDP সার্ভার
            webphone_api.setparameter('serveraddress', 'webphone.mizu-voip.com'); // Mizu-এর গ্লোবাল WebRTC ক্লাউড প্রক্সি
            webphone_api.setparameter('username', username);
            webphone_api.setparameter('password', password);
            webphone_api.setparameter('transport', 'wss'); // ব্রাউজার সিকিউর ট্র্যান্সপোর্ট এনাবল করা

            // কানেকশন শুরু
            webphone_api.start();
        }

        function startCall() {
            if(!isConnected) return alert("Please login first");
            const dest = document.getElementById('destination').value.trim();
            if (!dest) return alert("Please enter a destination number");
            webphone_api.call(dest);
        }

        function stopCall() {
            webphone_api.hangup();
        }
    </script>
</body>
</html>
