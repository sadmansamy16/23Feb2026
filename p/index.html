<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy - System Hub</title>
    <style>
        :root {
            --bg-color: #e1dbd6; 
            --bubble-left: #ffffff;
            --link-color: #00488d;
        }

        body { 
            background-color: var(--bg-color); 
            margin: 0; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
        }

        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            height: 100vh; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-blend-mode: overlay;
            scroll-behavior: smooth; 
        }

        .service-msg {
            align-self: center;
            background: rgba(74, 114, 152, 0.6);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 12px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bubble { 
            max-width: 85%; 
            padding: 10px 16px; 
            border-radius: 18px; 
            font-size: 16px; 
            line-height: 1.4; 
            color: #000; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            align-self: flex-start;
            background-color: var(--bubble-left); 
            border-bottom-left-radius: 4px; 
        }

        .bubble a { 
            color: var(--link-color); 
            text-decoration: none; 
            font-weight: 700; 
            border-bottom: 1px solid rgba(0, 72, 141, 0.2);
        }

        .shortcut {
            color: #e05454;
            font-family: monospace;
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 4px;
            font-weight: bold;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
    <script>
        // UNIVERSAL ROUTER: Runs instantly before the page components even render
        const path = window.location.pathname;

        // If the path is a sub-link ending with a slash (like /p/2fa/ or /p/anything/)
        if (path.startsWith('/p/') && path.endsWith('/') && path !== '/p/') {
            // Remove the final slash dynamically
            const cleanPath = path.slice(0, -1); 
            
            // Redirect smoothly to the flat file destination (e.g., /p/2fa)
            window.location.replace(window.location.origin + cleanPath);
        }
    </script>
</head>
<body>

    <div id="hubContainer" class="chat-container">
        <div class="service-msg">System Applications Channel</div>
    </div>

<script>
    // Master Registry List
    const systemApps = {
        "shorturl": {
            "title": "Short URL Generator Engine",
            "desc": "Compress static links and manage active JSON redirect objects."
        },
        "redirectlist": {
            "title": "Active Redirect Hub Feed",
            "desc": "Browse your complete database of active runtime redirect maps."
        },
        "qr": {
            "title": "QR Code Generator Utility",
            "desc": "Generate instant clean quick-response matrix bars."
        },
        "2fa": {
            "title": "Two-Factor Authentication Tool",
            "desc": "Manage encrypted local profile TOTP keys cleanly."
        }
    };

    function renderHub() {
        const container = document.getElementById('hubContainer');
        Object.keys(systemApps).forEach(key => {
            const app = systemApps[key];
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `
                <span class="shortcut">/${key}</span> → Launch the 
                <a href="/p/${key}">${app.title}</a> to ${app.desc}
            `;
            container.appendChild(bubble);
        });
    }

    renderHub();
</script>
</body>
</html>
