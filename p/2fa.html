<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=photo_camera,upload_file" />
    
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #e5e5ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overscroll-behavior-y: auto; 
            touch-action: auto; 
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }

        .app-shell {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
            padding: 30px 24px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 { font-size: 24px; font-weight: 700; margin: 0; color: #1c1c1e; }
        p { font-size: 14px; color: #8e8e93; margin: -5px 0 10px 0; }

        .action-row { display: flex; gap: 12px; }

        .btn-secondary {
            flex: 1; background: #f2f2f7; border: 1px solid #d1d1d6;
            border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: #1c1c1e; cursor: pointer; transition: background 0.2s;
        }
        .btn-secondary:active { background: #e5e5ea; }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; margin-bottom: 10px; }

        .input-field {
            width: 100%; background: #f9f9f9; border: 1.5px solid #e5e5ea;
            border-radius: 14px; padding: 16px; font-family: 'SF Mono', SFMono-Regular, ui-monospace, monospace;
            font-size: 16px; text-align: center; outline: none; box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #007aff; }

        .code-box {
            background: #f2f2f7; 
            border-radius: 24px; padding: 25px 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .label-tiny {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.2px; color: #8e8e93; margin-bottom: 12px;
        }

        #currentCode {
            font-size: 44px; font-weight: 800; color: #007aff;
            letter-spacing: 5px; margin-bottom: 20px; font-variant-numeric: tabular-nums;
        }

        .btn-primary {
            width: 100%; background: #007aff; color: white; border: none;
            border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.2);
            cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); background: #0063d1; }

        .footer-info { display: flex; justify-content: space-between; align-items: flex-end; padding: 5px; }
        .next-up-box { text-align: left; }
        
        .next-up-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer;
            padding: 4px 0;
        }

        #nextCode { font-size: 16px; font-weight: 600; color: #1c1c1e; }
        
        .copy-icon {
            width: 18px; height: 18px; fill: #007aff; opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
        }

        .timer-container { min-width: 90px; text-align: right; }
        #timerText { font-size: 12px; font-weight: 700; color: #007aff; }
        .progress-bg { background: #d1d1d6; height: 6px; border-radius: 10px; margin-top: 6px; overflow: hidden; }
        #progressBar { 
            background: #007aff; 
            height: 100%; 
            width: 100%; 
            transition: width 1s linear, background-color 0.3s; 
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="card">
        <h2>Authenticator</h2>
        <p>Scan QR or enter secret key</p>

        <div class="action-row">
            <button class="btn-secondary" id="startCamBtn" onclick="startCamera()">
                <span class="material-symbols-outlined">photo_camera</span> Camera
            </button>
            <button class="btn-secondary" id="stopCamBtn" onclick="stopCamera()" style="display:none; color:#ff3b30; border-color:#ff3b30;">
                <span class="material-symbols-outlined">close</span> Close
            </button>
            <label class="btn-secondary">
                <span class="material-symbols-outlined">upload_file</span> File
                <input type="file" accept="image/*" id="qr-input" onchange="scanFile(this)" style="display: none;">
            </label>
        </div>

        <div id="reader"></div>

        <input type="text" id="secretInput" class="input-field" placeholder="Enter Secret Key" spellcheck="false">

        <div class="code-box">
            <span class="label-tiny">Current Code</span>
            <div id="currentCode">------</div>
            <button class="btn-primary" id="copyBtn" onclick="copyCode('currentCode')">Copy Code</button>
        </div>

        <div class="footer-info">
            <div class="next-up-box">
                <span class="label-tiny">Next Up</span>
                <div class="next-up-row" onclick="copyCode('nextCode')">
                    <span id="nextCode">------</span>
                    <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </div>
            </div>
            <div class="timer-container">
                <span id="timerText">30s</span>
                <div class="progress-bg"><div id="progressBar"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const secretInput = document.getElementById('secretInput');
    const currentDisplay = document.getElementById('currentCode');
    const nextDisplay = document.getElementById('nextCode');
    const timerText = document.getElementById('timerText');
    const progressBar = document.getElementById('progressBar');
    const copyBtn = document.getElementById('copyBtn');
    const html5QrCode = new Html5Qrcode("reader");

    async function startCamera() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('startCamBtn').style.display = 'none';
        document.getElementById('stopCamBtn').style.display = 'flex';
        
        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 }, 
                (text) => {
                    processInput(text);
                    stopCamera();
                }
            );
        } catch (err) {
            alert("Camera access denied or error occurred.");
            stopCamera();
        }
    }

    function stopCamera() {
        if (html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('startCamBtn').style.display = 'flex';
                document.getElementById('stopCamBtn').style.display = 'none';
            });
        } else {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('startCamBtn').style.display = 'flex';
            document.getElementById('stopCamBtn').style.display = 'none';
        }
    }

    function scanFile(input) {
        if (input.files[0]) {
            html5QrCode.scanFile(input.files[0], true)
                .then(text => processInput(text))
                .catch(() => alert("No QR code found in this image."));
        }
    }

    function processInput(data) {
        let secret = data;
        // Basic parser for otpauth:// links
        if (data.includes('secret=')) {
            try {
                const url = new URL(data);
                secret = url.searchParams.get("secret");
            } catch(e) {
                const split = data.split('secret=')[1];
                secret = split ? split.split('&')[0] : data;
            }
        }
        secretInput.value = secret.toUpperCase().replace(/\s/g, '');
        updateTOTP();
    }

    function updateTOTP() {
        let raw = secretInput.value.replace(/[^A-Z2-7]/gi, '').toUpperCase();
        if (!raw || raw.length < 4) {
            currentDisplay.innerText = "------";
            nextDisplay.innerText = "------";
            return;
        }

        try {
            const totp = new OTPAuth.TOTP({
                secret: OTPAuth.Secret.fromBase32(raw),
                digits: 6,
                period: 30
            });

            const now = Date.now();
            const timeLeft = 30 - (Math.floor(now / 1000) % 30);
            
            currentDisplay.innerText = totp.generate();
            // Get code for next period
            nextDisplay.innerText = totp.generate({ timestamp: now + 30000 });
            
            timerText.innerText = timeLeft + "s";
            progressBar.style.width = (timeLeft / 30 * 100) + "%";
            
            const color = timeLeft <= 5 ? "#ff3b30" : "#007aff";
            progressBar.style.backgroundColor = color; 
            timerText.style.color = color;
        } catch (e) {
            currentDisplay.innerText = "INVALID";
            nextDisplay.innerText = "------";
        }
    }

    async function copyCode(id) {
        const val = document.getElementById(id).innerText;
        if(val.includes('-') || val === "INVALID") return;
        
        try {
            await navigator.clipboard.writeText(val);
            
            if (id === 'currentCode') {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "✓ Copied";
                copyBtn.style.background = "#34c759";
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.background = "#007aff";
                }, 1500);
            } else {
                const icon = document.querySelector('.copy-icon');
                icon.style.opacity = '1';
                icon.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    icon.style.opacity = '0.6';
                    icon.style.transform = 'scale(1)';
                }, 500);
            }
        } catch (err) {
            console.error("Copy failed", err);
        }
    }

    secretInput.addEventListener('input', updateTOTP);
    setInterval(updateTOTP, 1000);
</script>
</body>
</html>
