<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="/manifest.json">

    <title>SADMAN SAMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: rgba(229, 231, 235, 0.7);
            
            /* Brand Colors */
            --wa-color: #25D366;
            --phone-color: #0ea5e9;
            --fb-color: #1877F2;
            --ig-color: #E4405F;
            --x-color: #000000;
            --yt-color: #FF0000;
            --mail-color: #5A4335;
            --vcard-color: #111827;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Main Card Container */
        .card-container {
            position: relative;
            width: 100%;
            max-width: 440px;
            margin: 40px 20px;
            padding: 40px 24px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
            box-sizing: border-box;
        }

        /* Top Right Home Button */
        .home-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 42px;
            height: 42px;
            background: #f3f4f6;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
            z-index: 10;
        }
        .home-btn:hover {
            transform: scale(1.05);
            background: var(--text-main);
            color: #ffffff;
        }
        
        /* Profile Section */
        .profile-section { 
            margin-top: 15px;
            margin-bottom: 30px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        .profile-name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .profile-location {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .profile-location i {
            margin-right: 4px;
            color: #ef4444;
        }

        /* Action Row Bar - Keeps elements side-by-side */
        .fb-action-bar {
            display: flex;
            width: 90%;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        /* Save Contact Button */
        .fb-btn-primary {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 44px;
            background: var(--vcard-color);
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(17, 24, 39, 0.15);
            transition: all 0.2s ease;
            border: 1px solid var(--vcard-color);
        }
        .fb-btn-primary:hover {
            background: #1f2937;
            transform: translateY(-1px);
        }

        /* Message Button beside Save Contact */
        .fb-btn-secondary {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            color: var(--text-main);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
            font-size: 16px;
        }
        .fb-btn-secondary:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }

        /* Links Layout */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .contact-box {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .contact-box .brand-icon {
            font-size: 22px;
            width: 35px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            color: var(--text-muted);
        }

        .contact-box .brand-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
        }
        
        .button-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .label {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
        }
        .value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
        }

        .contact-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
            border-color: var(--text-main);
        }

        /* Brand Colors Hover States */
        .wa:hover { border-color: var(--wa-color); }
        .wa:hover .brand-icon, .wa:hover .label { color: var(--wa-color); }
        .phone:hover { border-color: var(--phone-color); }
        .phone:hover .brand-icon, .phone:hover .label { color: var(--phone-color); }
        .fb:hover { border-color: var(--fb-color); }
        .fb:hover .brand-icon, .fb:hover .label { color: var(--fb-color); }
        .ig:hover { border-color: var(--ig-color); }
        .ig:hover .brand-icon, .ig:hover .label { color: var(--ig-color); }
        .x-site:hover { border-color: var(--x-color); }
        .x-site:hover .label { color: var(--x-color); }
        .x-site:hover .brand-icon svg { fill: var(--x-color); }
        .yt:hover { border-color: var(--yt-color); }
        .yt:hover .brand-icon, .yt:hover .label { color: var(--yt-color); }
        .mail:hover { border-color: var(--mail-color); }
        .mail:hover .brand-icon, .mail:hover .label { color: var(--mail-color); }

        /* ADVANCED SELECTOR: Completely strips and completely hides the floating launcher on all resolutions */
        div[id^="intergramRoot"] div[class*="intergram-chat-closed"],
        #intergramRoot .intergram-chat-closed,
        .intergram-chat-closed {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            height: 0 !important;
            width: 0 !important;
        }

        /* Mobile Optimization */
        @media screen and (max-width: 480px) {
            body {
                background: #ffffff;
                align-items: flex-start;
            }
            .card-container {
                max-width: 100%;
                width: 100%;
                margin: 0;
                padding: 40px 20px;
                background: #ffffff;
                box-shadow: none;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Live Intergram Integration with Persistent States -->
    <script>
        window.intergramId = "6003288214"; 

        window.intergramCustomizations = {
            titleClosed: 'Chat with me!',
            titleOpen: 'Live Chat Panel',
            introMessage: 'Hi! Write a message below to chat live with Samy.',
            autoResponse: 'Your message has been sent to Samy. Please wait here for his live reply!',
            autoNoResponse: 'Samy is away from his desk. Leave your message here or contact via WhatsApp!',
            mainColor: '#111827', 
            alwaysUseFloatingButton: false 
        };

        // Mutation Observer to force-kill the floating launcher if it regenerates dynamically
        const observer = new MutationObserver(() => {
            const bubbles = document.querySelectorAll('.intergram-chat-closed, [class*="intergram-chat-closed"]');
            bubbles.forEach(b => b.remove());
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Trigger action mapping to your secondary header icon layout
        document.getElementById('customMessageBtn').addEventListener('click', function() {
            // Check if iframe exists, if not create a temporary click mechanism
            let closedButton = document.querySelector('#intergramRoot .intergram-chat-closed') || document.querySelector('.intergram-chat-closed');
            const openedPanel = document.querySelector('#intergramRoot .intergram-chat-opened');
            
            if (!closedButton && !openedPanel) {
                // If it hasn't fully loaded in DOM yet, simulate window load hook
                const tempBtn = document.createElement('div');
                tempBtn.className = 'intergram-chat-closed';
                document.body.appendChild(tempBtn);
                closedButton = tempBtn;
            }

            if (closedButton && !openedPanel) {
                closedButton.click();
            } else if (openedPanel) {
                const closeBtn = openedPanel.querySelector('div h1').nextSibling || openedPanel.querySelector('button');
                if (closeBtn) closeBtn.click();
            }
        });

        // SESSION SAFE RECOVERY LOGIC (Maintains session loop on active tab switches up to 20 minutes)
        window.addEventListener('blur', function() {
            // Saves current state timestamps into storage cache to keep socket channel alive
            localStorage.setItem('intergram_active_session', Date.now());
        });

        window.addEventListener('focus', function() {
            const lastActive = localStorage.getItem('intergram_active_session');
            if (lastActive && (Date.now() - lastActive < 1200000)) { // 20-minute safety threshold window
                // Restores layout instance gracefully without cycling a hard drop refresh
                const panel = document.querySelector('#intergramRoot .intergram-chat-opened');
                if(panel) { panel.style.display = 'block'; }
            }
        });
    </script>
    <script id="intergram" type="text/javascript" src="https://www.intergram.xyz/js/widget.js"></script>
