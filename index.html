<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="/manifest.json">

    <title>SADMAN SAMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: rgba(229, 231, 235, 0.7);
            
            /* Brand Colors */
            --wa-color: #25D366;
            --phone-color: #0ea5e9;
            --fb-color: #1877F2;
            --ig-color: #E4405F;
            --x-color: #000000;
            --yt-color: #FF0000;
            --mail-color: #5A4335;
            --vcard-color: #111827;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Main Card Container */
        .card-container {
            position: relative;
            width: 100%;
            max-width: 440px;
            margin: 40px 20px;
            padding: 40px 24px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
            box-sizing: border-box;
        }

        /* Top Right Home Button */
        .home-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 42px;
            height: 42px;
            background: #f3f4f6;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
            z-index: 10;
        }
        .home-btn:hover {
            transform: scale(1.05);
            background: var(--text-main);
            color: #ffffff;
        }

        /* Top Left Save Contact Button (Black Color Theme) */
        .vcard-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 42px;
            height: 42px;
            background: var(--vcard-color);
            border: 1px solid var(--vcard-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
            z-index: 10;
        }
        .vcard-btn:hover {
            transform: scale(1.05);
            background: #ffffff;
            color: var(--vcard-color);
            border-color: var(--border-color);
        }
        
        /* Profile Section */
        .profile-section { 
            margin-top: 15px;
            margin-bottom: 35px; 
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        .profile-name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .profile-location {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
        }
        .profile-location i {
            margin-right: 4px;
            color: #ef4444;
        }

        /* Links Layout */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .contact-box {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Brand Icon Wrapper */
        .contact-box .brand-icon {
            font-size: 22px;
            width: 35px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            color: var(--text-muted);
            transition: color 0.25s ease;
        }

        /* SVG X Icon styling */
        .contact-box .brand-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: fill 0.25s ease;
        }
        
        .button-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .label {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
            transition: color 0.25s ease;
        }
        .value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Hover Effects */
        .contact-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
            border-color: var(--text-main);
        }

        /* Brand Colors on Hover */
        .wa:hover { border-color: var(--wa-color); }
        .wa:hover .brand-icon, .wa:hover .label { color: var(--wa-color); }

        .phone:hover { border-color: var(--phone-color); }
        .phone:hover .brand-icon, .phone:hover .label { color: var(--phone-color); }

        .fb:hover { border-color: var(--fb-color); }
        .fb:hover .brand-icon, .fb:hover .label { color: var(--fb-color); }

        .ig:hover { border-color: var(--ig-color); }
        .ig:hover .brand-icon, .ig:hover .label { color: var(--ig-color); }

        .x-site:hover { border-color: var(--x-color); }
        .x-site:hover .label { color: var(--x-color); }
        .x-site:hover .brand-icon svg { fill: var(--x-color); }

        .yt:hover { border-color: var(--yt-color); }
        .yt:hover .brand-icon, .yt:hover .label { color: var(--yt-color); }

        .mail:hover { border-color: var(--mail-color); }
        .mail:hover .brand-icon, .mail:hover .label { color: var(--mail-color); }

        /* Mobile Optimization */
        @media screen and (max-width: 480px) {
            body {
                background: #ffffff;
                align-items: flex-start;
            }
            .card-container {
                max-width: 100%;
                width: 100%;
                margin: 0;
                padding: 40px 20px;
                background: #ffffff;
                box-shadow: none;
                border: none;
                border-radius: 0px;
            }
            .home-btn {
                top: 20px;
                right: 20px;
            }
            .vcard-btn {
                top: 20px;
                left: 20px;
            }
        }
    </style>
</head>
