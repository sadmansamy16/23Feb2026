<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Pro</title>
    
    

    <script type="text/javascript">
        var path = window.location.pathname.toLowerCase();
        
        // 1. SAFETY CHECK: STOP ALL LOGIC IF IN CHAT
        if (path === "/chat" || path === "/chat/" || path.startsWith("/chat/")) {
            console.log("Chat folder detected. Loading Chat PWA.");
        } else {
            var search = window.location.search;
            var hash = window.location.hash;
            
            // Clean the path (e.g., "/2faa/" -> "2faa")
            var cleanPath = path.replace(/^\/|\/$/g, '');

            // 2. REDIRECT TABLE
            var redirects = {
                "2faa": "https://s.samy.pro.bd/p/2fa.html", // New redirect trigger
                "qr": "https://s.samy.pro.bd/p/qr.html",
                "password": "https://vault.bitwarden.eu",
                "p": "https://vault.bitwarden.eu"
            };

            // 3. EXECUTE REDIRECT ONLY IF IN LIST
            // This means /2fa will NOT redirect because it's not in the list anymore
            if (redirects[cleanPath]) {
                var targetURL = redirects[cleanPath] + search + hash;
                window.location.replace(targetURL);
            } else if (cleanPath === "" || cleanPath === "index.html") {
                // If at root, stay here (Home of PWA)
                console.log("At root. Welcome to the PWA.");
            } else if (cleanPath !== "2fa") {
                // Default redirect for unknown paths (excluding 2fa)
                // window.location.replace("https://www.samy.pro.bd" + path + search + hash);
            }
        }
    </script>
</head>
<body style="background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div id="content">
        <h1>Samy Pro</h1>
        <p>Loading your workspace...</p>
    </div>

    <script>
        // Hide the loading message if the user is in the chat folder
        if (window.location.pathname.includes('/chat')) {
            document.body.style.display = 'none';
        }
    </script>
</body>
</html>
