<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Pro</title>
    <script type="text/javascript">
        (async function() {
            const path = window.location.pathname.toLowerCase();
            const cleanPath = path.replace(/^\/|\/$/g, '');
            
            // 1. CHAT EXCEPTION
            if (path.startsWith("/chat")) return;

            // 2. ROOT REDIRECT
            if (cleanPath === "" || cleanPath === "index.html") {
                window.location.replace("https://www.samy.pro.bd/");
                return;
            }

            try {
                // 3. FETCH REDIRECT DATA
                const response = await fetch('/links.json');
                if (!response.ok) throw new Error("JSON not found");
                
                const redirects = await response.json();

                // 4. EXECUTE REDIRECT
                if (redirects[cleanPath]) {
                    window.location.replace(redirects[cleanPath] + window.location.search + window.location.hash);
                } else {
                    // Fallback if the short-link doesn't exist in your JSON
                    document.getElementById('status').innerText = "Link not found.";
                }
            } catch (err) {
                console.error("Redirect Error:", err);
                document.getElementById('status').innerText = "System error. Please try again later.";
            }
        })();
    </script>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        .container { text-align: center; }
        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; }
        p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Samy Pro</h1>
        <p id="status">Redirecting...</p>
    </div>
</body>
</html>
