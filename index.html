<!DOCTYPE html>
<html>
  <head>
    <script type="text/javascript">
        // 1. Get the current path (everything after .bd)
        var path = window.location.pathname;
        var search = window.location.search; // for things like ?m=1
        var hash = window.location.hash;     // for things like #section1

        // 2. Combine them with your new subdomain
        var targetURL = "https://sadman.samy.pro.bd" + path + search + hash;

        // 3. Execute the redirect
        window.location.replace(targetURL);
    </script>
    
    <meta http-equiv="refresh" content="0; url=https://sadman.samy.pro.bd">
    
    <title>Redirecting...</title>
  </head>
  <body>
    <p>Redirecting you to <a href="https://sadman.samy.pro.bd">s.samy.pro.bd</a>...</p>
  </body>
</html>
