<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        var path = window.location.pathname.toLowerCase();
        
        // --- SAFETY CHECK: STOP REDIRECT IF GOING TO CHAT ---
        if (path === "/chat" || path === "/chat/" || path.startsWith("/chat/")) {
            // Do nothing. This allows GitHub to load the /chat folder files.
            console.log("Chat folder detected. Stopping redirect.");
        } else {
            var search = window.location.search;
            var hash = window.location.hash;
            
            // Remove slashes for lookup: "/2fa/" -> "2fa"
            var cleanPath = path.replace(/^\/|\/$/g, '');

            var redirects = {
                "2faa": "https://s.samy.pro.bd/p/2fa.html",
                "qr": "https://s.samy.pro.bd/p/qr.html",
                "password": "https://vault.bitwarden.eu",
                "p": "https://vault.bitwarden.eu"
            };

            var targetURL;

            if (redirects[cleanPath]) {
                targetURL = redirects[cleanPath] + search + hash;
            } else {
                targetURL = "https://www.samy.pro.bd" + path + search + hash;
            }

            window.location.replace(targetURL);
        }
    </script>
    
    <script>
      if (!window.location.pathname.includes('/chat')) {
        document.write('<meta http-equiv="refresh" content="2; url=https://www.samy.pro.bd">');
      }
    </script>
  </head>
  <body style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #333;">
    <div id="redirect-msg">
        <p>Redirecting you to the requested page...</p>
        <p>If you are not redirected, <a href="https://www.samy.pro.bd" style="color: #007bff;">click here</a>.</p>
    </div>
    <script>
        // Hide message if we are in the chat folder
        if (window.location.pathname.includes('/chat')) {
            document.getElementById('redirect-msg').style.display = 'none';
        }
    </script>
  </body>
</html>
