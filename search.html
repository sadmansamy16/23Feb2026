<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <link href="https://samy.pro.bd/favicon.ico" rel="icon" type="image/x-icon" />
    
    <style>
        :root {
            --bg-color: #f4f5f6;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0b0b0c;
                --surface-color: #161617;
                --text-main: #f5f5f7;
                --text-muted: #86868b;
                --accent-color: #2997ff;
                --border-color: #2d2d2f;
                --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            transition: var(--transition);
        }

        .workspace {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .search-wrapper { width: 100%; }

        .search-bar-container {
            display: flex;
            align-items: center;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4px 8px 4px 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .search-bar-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        .search-icon {
            color: var(--text-muted);
            margin-right: 14px;
            display: flex;
            align-items: center;
        }

        .search-icon svg { width: 20px; height: 20px; fill: currentColor; }

        input { 
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px; 
            color: var(--text-main);
            outline: none;
            padding: 14px 0;
            width: 100%;
        }

        .go-btn { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; 
            transition: var(--transition);
        }

        .go-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .shortcuts-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .shortcuts-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
        }
        @media (max-width: 400px) {
            .shortcuts-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: var(--transition);
            border-radius: 16px;
            padding: 10px;
        }

        .shortcut-item:hover {
            background: var(--surface-color);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .icon-container {
            width: 56px;
            height: 56px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .icon-container img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 4px;
        }

        .icon-fallback {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-color);
            background: rgba(0, 113, 227, 0.08);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .shortcut-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <div class="search-icon">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
            <input type="text" id="urlInput" placeholder="Search Google or type URL" inputmode="search" autocomplete="off" spellcheck="false" autofocus>
            <button class="go-btn" onclick="navigateToSite()">
                <svg viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg>
            </button>
        </div>
    </div>

    <div class="shortcuts-grid" id="shortcutsLibrary"></div>
</div>

<script>
    async function loadShortcuts() {
        try {
            // Concurrent execution reading from both of your detached structural targets
            const [listResponse, imgResponse] = await Promise.all([
                fetch('search_web_list.json'),
                fetch('search_web_img.json')
            ]);

            const webList = await listResponse.json();
            const webImgs = await imgResponse.json();
            
            const grid = document.getElementById('shortcutsLibrary');
            grid.innerHTML = '';

            webList.forEach(item => {
                const name = item[0]; // Parses raw string index 0 as name
                const destinationUrl = item[1]; // Parses raw string index 1 as url
                const logoUrl = webImgs[name];

                const anchor = document.createElement('a');
                anchor.className = 'shortcut-item';
                anchor.href = destinationUrl;

                let iconContent = '';
                if (logoUrl) {
                    iconContent = `<img src="${logoUrl}" alt="${name}" onerror="this.outerHTML=getFallbackHtml('${name}')">`;
                } else {
                    iconContent = getFallbackHtml(name);
                }

                anchor.innerHTML = `
                    <div class="icon-container">${iconContent}</div>
                    <div class="shortcut-title">${name}</div>
                `;
                grid.appendChild(anchor);
            });
        } catch (error) {
            console.error('Error reading external shortcut arrays:', error);
        }
    }

    function getFallbackHtml(title) {
        return `<div class="icon-fallback">${title.trim().charAt(0)}</div>`;
    }

    function navigateToSite() {
        const input = document.getElementById('urlInput').value.trim();
        if (!input) return;

        const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/i;

        if (urlPattern.test(input)) {
            let url = input;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            window.location.href = url;
        } else {
            window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(input);
        }
    }

    document.getElementById('urlInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") navigateToSite();
    });

    document.addEventListener("DOMContentLoaded", loadShortcuts);
</script>
</body>
</html>
