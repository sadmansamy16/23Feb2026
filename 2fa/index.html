<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* Lock the entire screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents all scrolling */
            background-color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center; /* Centers the card perfectly on screen */
            touch-action: pan-y; /* Allows the browser's native pull-to-refresh */
        }

        /* The App Container */
        .app-shell {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Prevents the 'bouncing' effect on iOS */
            overscroll-behavior-y: contain; 
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 30px 20px;
            text-align: center;
            width: 100%;
        }

        h2 { font-size: 22px; margin: 0 0 5px 0; color: #1c1c1e; }
        p { font-size: 13px; color: #8e8e93; margin: 0 0 25px 0; }

        .action-row { display: flex; gap: 10px; margin-bottom: 20px; }

        .btn-secondary {
            flex: 1;
            background: #f2f2f7;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #1c1c1e;
        }

        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }

        .input-field {
            width: 100%;
            background: #f9f9f9;
            border: 1.5px solid #efeff4;
            border-radius: 14px;
            padding: 16px;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 25px;
        }

        .code-box {
            background: #f2f2f7;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .label-tiny {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8e8e93;
            margin-bottom: 8px;
            display: block;
        }

        #currentCode {
            font-size: 40px;
            font-weight: 800;
            color: #007aff;
            letter-spacing: 4px;
            margin-bottom: 15px;
            font-variant-numeric: tabular-nums;
        }

        .btn-primary {
            width: 100%;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
        }

        .next-up-box { text-align: left; }
        #nextCode { font-size: 16px; font-weight: 600; color: #1c1c1e; }

        .timer-container { min-width: 90px; text-align: right; }
        #timerText { font-size: 12px; font-weight: 700; color: #007aff; }

        .progress-bg {
            background: #e5e5ea;
            height: 4px;
            border-radius: 2px;
            margin-top: 5px;
            width: 100%;
        }

        #progressBar {
            background: #007aff;
            height: 100%;
            width: 100%;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="card">
        <h2>Authenticator</h2>
        <p>Scan QR or enter secret key</p>

        <div class="action-row">
            <button class="btn-secondary" id="startCamBtn" onclick="startCamera()">📷 Camera</button>
            <button class="btn-secondary" id="stopCamBtn" onclick="stopCamera()" style="display:none; color:#ff3b30;">✕ Close</button>
            <label class="btn-secondary">
                🖼️ File
                <input type="file" accept="image/*" id="qr-input" onchange="scanFile(this)" style="display: none;">
            </label>
        </div>

        <div id="reader"></div>

        <input type="text" id="secretInput" class="input-field" placeholder="Secret Key">

        <div class="code-box">
            <span class="label-tiny">Current Code</span>
            <div id="currentCode">------</div>
            <button class="btn-primary" onclick="copyCode('currentCode')">Copy Code</button>
        </div>

        <div class="footer-info">
            <div class="next-up-box">
                <span class="label-tiny">Next Up</span>
                <span id="nextCode">------</span>
            </div>
            <div class="timer-container">
                <span id="timerText">30s</span>
                <div class="progress-bg"><div id="progressBar"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic remains same as previous but integrated into the locked layout
    const secretInput = document.getElementById('secretInput');
    const currentDisplay = document.getElementById('currentCode');
    const nextDisplay = document.getElementById('nextCode');
    const timerText = document.getElementById('timerText');
    const progressBar = document.getElementById('progressBar');
    const html5QrCode = new Html5Qrcode("reader");

    function startCamera() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('startCamBtn').style.display = 'none';
        document.getElementById('stopCamBtn').style.display = 'flex';
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            const secret = new URL(text).searchParams.get("secret") || text;
            secretInput.value = secret.toUpperCase();
            updateTOTP(); stopCamera();
        }).catch(() => {});
    }

    function stopCamera() {
        html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('startCamBtn').style.display = 'flex';
            document.getElementById('stopCamBtn').style.display = 'none';
        });
    }

    function scanFile(input) {
        if (input.files[0]) {
            html5QrCode.scanFile(input.files[0], true).then(text => {
                const secret = new URL(text).searchParams.get("secret") || text;
                secretInput.value = secret.toUpperCase(); updateTOTP();
            });
        }
    }

    function updateTOTP() {
        const secret = secretInput.value.replace(/\s/g, '').toUpperCase();
        if (!secret) return;
        try {
            let totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) });
            const timeLeft = 30 - (Math.floor(Date.now() / 1000) % 30);
            currentDisplay.innerText = totp.generate();
            nextDisplay.innerText = totp.generate({ timestamp: Date.now() + 30000 });
            timerText.innerText = timeLeft + "s";
            progressBar.style.width = (timeLeft / 30 * 100) + "%";
            const color = timeLeft <= 5 ? "#ff3b30" : "#007aff";
            progressBar.style.background = color; timerText.style.color = color;
        } catch (e) {}
    }

    function copyCode(id) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
    }

    secretInput.addEventListener('input', updateTOTP);
    setInterval(updateTOTP, 1000);
</script>
</body>
</html>
