<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <link rel="manifest" href="/manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function() { console.log('PWA Linked'); })
            .catch(function(err) { console.error('PWA Error', err); });
        });
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #e5e5ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overscroll-behavior-y: auto; 
            touch-action: auto; 
        }

        .app-shell {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
            padding: 30px 24px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 { font-size: 24px; font-weight: 700; margin: 0; color: #1c1c1e; }
        p { font-size: 14px; color: #8e8e93; margin: -5px 0 10px 0; }

        .action-row { display: flex; gap: 12px; }

        .btn-secondary {
            flex: 1; background: #f2f2f7; border: 1px solid #d1d1d6;
            border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: #1c1c1e; cursor: pointer;
        }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; margin-bottom: 10px; }

        .input-field {
            width: 100%; background: #f9f9f9; border: 1.5px solid #e5e5ea;
            border-radius: 14px; padding: 16px; font-family: monospace;
            font-size: 16px; text-align: center; outline: none; box-sizing: border-box;
        }

        .code-box {
            background: #f2f2f7; 
            border-radius: 24px; padding: 25px 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .label-tiny {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.2px; color: #8e8e93; margin-bottom: 12px;
        }

        #currentCode {
            font-size: 44px; font-weight: 800; color: #007aff;
            letter-spacing: 5px; margin-bottom: 20px; font-variant-numeric: tabular-nums;
        }

        .btn-primary {
            width: 100%; background: #007aff; color: white; border: none;
            border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
            cursor: pointer;
        }

        .footer-info { display: flex; justify-content: space-between; align-items: flex-end; padding: 5px; }
        .next-up-box { text-align: left; }
        
        .next-up-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer;
        }
