<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* Prevents scrolling and sets background */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            touch-action: pan-y;
        }

        .app-shell {
            width: 100%;
            padding: 20px; /* Space between card and screen edges */
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            padding: 30px 20px;
            text-align: center;
            width: 100%;
            max-width: 400px; /* Limits width on big screens */
            box-sizing: border-box; /* CRITICAL: keeps everything inside */
            display: flex;
            flex-direction: column;
        }

        h2 { font-size: 22px; font-weight: 700; margin: 0 0 4px 0; color: #111; }
        p { font-size: 13px; color: #8e8e93; margin: 0 0 24px 0; }

        .action-row { display: flex; gap: 10px; margin-bottom: 20px; }

        .btn-secondary {
            flex: 1; background: #f1f3f5; border: none; border-radius: 12px;
            padding: 12px; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: #1c1c1e; cursor: pointer;
        }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 15px; display: none; }

        /* Fixed Input: Now strictly inside the card */
        .input-field {
            width: 100%; 
            background: #ffffff; 
            border: 1px solid #e9ecef;
            border-radius: 14px; 
            padding: 14px; 
            font-family: monospace;
            font-size: 15px; 
            text-align: center; 
            outline: none; 
            margin-bottom: 20px;
            box-sizing: border-box; /* Ensures padding doesn't push it out */
        }

        .code-box { 
            background: #f8f9fa; 
            border-radius: 24px; 
            padding: 25px 15px; 
            margin-bottom: 20px; 
            box-sizing: border-box;
        }

        .label-tiny {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.2px; color: #adb5bd; margin-bottom: 10px; display: block;
        }

        #currentCode {
            font-size: 38px; font-weight: 800; color: #007bff;
            letter-spacing: 4px; margin-bottom: 15px; font-variant-numeric: tabular-nums;
        }

        .btn-primary {
            width: 100%; background: #007bff; color: white; border: none;
            border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 600;
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.2);
            cursor: pointer;
        }

        .footer-info { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 5px; }
        .next-up-box { text-align: left; }
        #nextCode { font-size: 15px; font-weight: 600; color: #212529; }
        .timer-container { min-width: 80px; text-align: right; }
        #timerText { font-size: 12px; font-weight: 700; color: #007aff; }
        .progress-bg { background: #e9ecef; height: 5px; border-radius: 10px; margin-top: 6px; width: 100%; overflow: hidden; }
        #progressBar { background: #007aff; height: 100%; width: 100%; transition: width 1s linear; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="card">
        <h2>Authenticator</h2>
        <p>Scan QR or enter secret key</p>

        <div class="action-row">
            <button class="btn-secondary" id="startCamBtn" onclick="startCamera()">📷 Camera</button>
            <button class="btn-secondary" id="stopCamBtn" onclick="stopCamera()" style="display:none; color:#fa5252;">✕ Close</button>
            <label class="btn-secondary">
                🖼️ File
                <input type="file" accept="image/*" id="qr-input" onchange="scanFile(this)" style="display: none;">
            </label>
        </div>

        <div id="reader"></div>

        <input type="text" id="secretInput" class="input-field" placeholder="Enter Secret Key (e.g. JBSW...)">

        <div class="code-box">
            <span class="label-tiny">Current Code</span>
            <div id="currentCode">------</div>
