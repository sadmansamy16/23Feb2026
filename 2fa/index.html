<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* Lock the background and center everything */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #f8f9fa; /* Matches your original soft background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: pan-y;
        }

        /* The shell ensures the card never touches the screen edges */
        .app-shell {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px; /* This creates the space on left/right/top/bottom */
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            border-radius: 32px; /* Smoother corners like your original */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            padding: 35px 24px;
            text-align: center;
            /* This ensures the box stays small enough on big phones but has gaps on small ones */
            width: 100%;
            max-width: 380px; 
            box-sizing: border-box;
        }

        h2 { font-size: 24px; font-weight: 700; margin: 0 0 6px 0; color: #111; }
        p { font-size: 14px; color: #8e8e93; margin: 0 0 28px 0; }

        .action-row { display: flex; gap: 12px; margin-bottom: 24px; }

        .btn-secondary {
            flex: 1;
            background: #f1f3f5;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #1c1c1e;
            cursor: pointer;
        }

        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }

        .input-field {
            width: 100%;
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 16px;
            padding: 18px;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 28px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .code-box {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 30px 20px;
            margin-bottom: 28px;
        }

        .label-tiny {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #adb5bd;
            margin-bottom: 12px;
            display: block;
        }

        #currentCode {
            font-size: 44px;
            font-weight: 800;
            color: #007bff;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .btn-primary {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.25);
            transition: transform 0.1s;
        }
        
        .btn-primary:active { transform: scale(0.98); }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5px;
        }

        .next-up-box { text-align: left; }
        #nextCode { font-size: 16px; font-weight: 600; color: #212529; letter-spacing: 1px; }

        .timer-container { min-width: 100px; text-align: right; }
        #timerText { font-size: 13px; font-weight: 700; color: #007bff; }

        .progress-bg {
            background: #e9ecef;
            height: 6px;
            border-radius: 10px;
            margin-top: 8px;
            width: 100%;
            overflow: hidden;
        }

        #progressBar {
            background: #007bff;
            height: 100%;
            width: 100%;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="card">
        <h2>Authenticator</h2>
        <p>Scan QR or enter secret key</p>

        <div class="action-row">
            <button class="btn-secondary" id="startCamBtn" onclick="startCamera()">📷 Camera</button>
            <button class="btn-secondary" id="stopCamBtn" onclick="stopCamera()" style="display:none; color:#fa5252;">✕ Close</button>
            <label class="btn-secondary">
                🖼️ File
                <input type="file" accept="image/*" id="qr-input" onchange="scanFile(this)" style="display: none;">
            </label>
        </div>

        <div id="reader"></div>

        <input type="text" id="secretInput" class="input-field" placeholder="Enter Secret Key">

        <div class="code-box">
            <span class="label-tiny">Current Code</span>
            <div id="currentCode">------</div>
            <button class="btn-primary" onclick="copyCode('currentCode')">Copy Code</button>
        </div>

        <div class="footer-info">
            <div class="next-up-box">
                <span class="label-tiny">Next Up</span>
                <span id="nextCode">------</span>
            </div>
            <div class="timer-container">
                <span id="timerText">30s</span>
                <div class="progress-bg"><div id="progressBar"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const secretInput = document.getElementById('secretInput');
    const currentDisplay = document.getElementById('currentCode');
    const nextDisplay = document.getElementById('nextCode');
    const timerText = document.getElementById('timerText');
    const progressBar = document.getElementById('progressBar');
    const html5QrCode = new Html5Qrcode("reader");

    function startCamera() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('startCamBtn').style.display = 'none';
        document.getElementById('stopCamBtn').style.display = 'flex';
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            let secret = text;
            if (text.includes('secret=')) {
                const url = new URL(text);
                secret = url.searchParams.get("secret");
            }
            secretInput.value = secret.toUpperCase();
            updateTOTP(); stopCamera();
        }).catch(() => {});
    }

    function stopCamera() {
        html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('startCamBtn').style.display = 'flex';
            document.getElementById('stopCamBtn').style.display = 'none';
        });
    }

    function scanFile(input) {
        if (input.files[0]) {
            html5QrCode.scanFile(input.files[0], true).then(text => {
                let secret = text;
                if (text.includes('secret=')) {
                    const url = new URL(text);
                    secret = url.searchParams.get("secret");
                }
                secretInput.value = secret.toUpperCase(); updateTOTP();
            }).catch(() => alert("Could not find QR code"));
        }
    }
