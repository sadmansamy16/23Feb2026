<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>

    <link rel="manifest" href="/manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Registering the root service worker to cover this subfolder
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(() => console.log('Authenticator linked to Root PWA'))
            .catch(err => console.error('PWA Connection Error:', err));
        });
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
