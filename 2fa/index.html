<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authenticator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f2f2f7; /* Light grey iOS-style background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Main Container: Adjusted for Mobile Width */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            margin-top: 40px; /* Space from the top of the phone screen */
        }

        /* The Card */
        .card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px 20px;
            text-align: center;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #1c1c1e;
        }

        p {
            font-size: 14px;
            color: #8e8e93;
            margin: 0 0 25px 0;
        }

        /* Buttons Row */
        .action-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-secondary {
            flex: 1;
            background: #f2f2f7;
            border: 1px solid #d1d1d6;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            color: #1c1c1e;
        }

        /* QR Scanner Container */
        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            border: 2px solid #007aff;
        }

        /* Secret Key Input */
        .input-field {
            width: 100%;
            background: #f9f9f9;
            border: 2px solid #efeff4;
            border-radius: 14px;
            padding: 16px;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border 0.3s ease;
            margin-bottom: 25px;
        }

        .input-field:focus {
            border-color: #007aff;
        }

        /* Code Display Area */
        .code-box {
            background: #f2f2f7;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .label-tiny {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8e8e93;
            display: block;
            margin-bottom: 10px;
        }

        #currentCode {
            font-size: 42px;
            font-weight: 800;
            color: #007aff;
            letter-spacing: 4px;
            margin-bottom: 15px;
            font-variant-numeric: tabular-nums;
        }

        .btn-primary {
            width: 100%;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        /* Footer / Next Up Area */
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 25px;
            text-align: left;
        }

        .next-up-box {
            display: flex;
            flex-direction: column;
        }

        #nextCode {
            font-size: 18px;
            font-weight: 600;
            color: #1c1c1e;
        }

        /* Timer and Progress */
        .timer-container {
            min-width: 100px;
            text-align: right;
        }

        #timerText {
            font-size: 13px;
            font-weight: 700;
            color: #007aff;
        }

        .progress-bg {
            background: #e5e5ea;
            height: 6px;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
            width: 100%;
        }

        #progressBar {
            background: #007aff;
            height: 100%;
            width: 100%;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Authenticator</h2>
        <p>Scan QR or enter secret key</p>

        <div class="action-row">
            <button class="btn-secondary" id="startCamBtn" onclick="startCamera()">
                📷 Camera
            </button>
            <button class="btn-secondary" id="stopCamBtn" onclick="stopCamera()" style="display:none; background:#ffe5e5; color:#ff3b30; border-color:#ff3b30;">
                ✕ Close
            </button>
            <label class="btn-secondary">
                🖼️ File
                <input type="file" accept="image/*" id="qr-input" onchange="scanFile(this)" style="display: none;">
            </label>
        </div>

        <div id="reader"></div>

        <input type="text" id="secretInput" class="input-field" placeholder="Enter Secret Key">

        <div class="code-box">
            <span class="label-tiny">Current Code</span>
            <div id="currentCode">------</div>
            <button class="btn-primary" id="copyBtn" onclick="copyCode('currentCode')">Copy Code</button>
        </div>

        <div class="footer-info">
            <div class="next-up-box">
                <span class="label-tiny">Next Up</span>
                <span id="nextCode">------</span>
            </div>
            
            <div class="timer-container">
                <span id="timerText">30s</span>
                <div class="progress-bg">
                    <div id="progressBar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const secretInput = document.getElementById('secretInput');
    const currentDisplay = document.getElementById('currentCode');
    const nextDisplay = document.getElementById('nextCode');
    const timerText = document.getElementById('timerText');
    const progressBar = document.getElementById('progressBar');
    const copyBtn = document.getElementById('copyBtn');
    const html5QrCode = new Html5Qrcode("reader");

    function startCamera() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('startCamBtn').style.display = 'none';
        document.getElementById('stopCamBtn').style.display = 'flex';
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (text) => {
                const url = new URL(text);
                const secret = url.searchParams.get("secret");
                if(secret) {
                    secretInput.value = secret.toUpperCase();
                    updateTOTP();
                    stopCamera();
                }
            },
            () => {}
        ).catch(err => alert("Camera error: " + err));
    }

    function stopCamera() {
        html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('startCamBtn').style.display = 'flex';
            document.getElementById('stopCamBtn').style.display = 'none';
        });
    }

    function scanFile(input) {
        if (input.files && input.files[0]) {
            html5QrCode.scanFile(input.files[0], true)
                .then(text => {
                    const url = new URL(text);
                    const secret = url.searchParams.get("secret");
                    if(secret) { secretInput.value = secret.toUpperCase(); updateTOTP(); }
                })
                .catch(() => alert("No QR code found"));
        }
    }

    function updateTOTP() {
        const secret = secretInput.value.replace(/\s/g, '').toUpperCase();
        if (!secret) return;

        try {
            let totp = new OTPAuth.TOTP({
                secret: OTPAuth.Secret.fromBase32(secret),
                digits: 6,
                period: 30
            });

            const now = Date.now();
            const seconds = Math.floor(now / 1000) % 30;
            const timeLeft = 30 - seconds;

            currentDisplay.innerText = totp.generate();
            nextDisplay.innerText = totp.generate({ timestamp: now + 30000 });
            
            timerText.innerText = timeLeft + "s";
            progressBar.style.width = (timeLeft / 30 * 100) + "%";
            
            // Red alert UI
            const color = timeLeft <= 5 ? "#ff3b30" : "#007aff";
            progressBar.style.background = color;
            timerText.style.color = color;
        } catch (e) {}
    }

    function copyCode(id) {
        const text = document.getElementById(id).innerText;
        if (text.includes('-')) return;
        navigator.clipboard.writeText(text);
        const original = copyBtn.innerText;
        copyBtn.innerText = "Copied!";
        setTimeout(() => copyBtn.innerText = original, 2000);
    }

    secretInput.addEventListener('input', updateTOTP);
    setInterval(updateTOTP, 1000);
</script>

</body>
</html>
