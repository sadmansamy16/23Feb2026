<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #e5e5ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-size: 24px; display: inline-block; line-height: 1; -webkit-font-smoothing: antialiased; }
        .app-shell { width: 100%; padding: 20px; display: flex; justify-content: center; box-sizing: border-box; }
        .card {
            background: #ffffff; border-radius: 30px; box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
            padding: 30px 24px; text-align: center; width: 100%; max-width: 380px;
            box-sizing: border-box; display: flex; flex-direction: column; gap: 15px;
        }
        .action-row { display: flex; gap: 10px; width: 100%; }
        .btn-secondary {
            flex: 1; background: #f2f2f7; border: 1px solid #d1d1d6; border-radius: 14px;
            padding: 12px 5px; font-size: 13px; font-weight: 600; display: flex;
            align-items: center; justify-content: center; gap: 6px; color: #1c1c1e; cursor: pointer;
        }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; margin-bottom: 10px; }
        .input-field {
            width: 100%; background: #f9f9f9; border: 1.5px solid #e5e5ea; border-radius: 14px;
            padding: 16px; font-family: monospace; font-size: 16px; text-align: center; outline: none; box-sizing: border-box;
        }
        .code-box { background: #f2f2f7; border-radius: 24px; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; }
        #currentCode { font-size: 44px; font-weight: 800; color: #007aff; letter-spacing: 5px; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        .btn-primary { width: 100%; background: #007aff; color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .footer-info { display: flex; justify-content: space-between; align-items: flex-end; padding: 5px; }
        #nextCode { font-size: 16px; font-weight: 600; color: #1c1c1e; cursor: pointer;}
        .timer-container { min-width: 90px; text-align: right; }
        #timerText { font-size: 12px; font-weight: 700; color: #007aff; }
        .progress-bg { background: #d1d1d6; height: 6px; border-radius: 10px; margin-top: 6px; overflow: hidden; }
        #progressBar { background: #007aff; height: 100%; width: 100%; transition: width 1s linear; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="card">
        <h2>Authenticator</h2>
        <p>Enter key or scan QR</p>
        
        <div class="action-row">
            <button class="btn-secondary" id="startCamBtn" onclick="startCamera()">
                <span class="material-symbols-outlined">photo_camera</span> <span>Camera</span>
            </button>
            <button class="btn-secondary" id="stopCamBtn" onclick="stopCamera()" style="display:none; color:#ff3b30;">
                <span class="material-symbols-outlined">close</span> <span>Close</span>
            </button>
            <label class="btn-secondary">
                <span class="material-symbols-outlined">upload_file</span> <span>File</span>
                <input type="file" accept="image/*" id="qr-input" onchange="scanFile(this)" style="display: none;">
            </label>
        </div>

        <div id="reader"></div>

        <input type="text" id="secretInput" class="input-field" placeholder="Secret Key" autocomplete="off">

        <div class="code-box">
            <div id="currentCode">------</div>
            <button class="btn-primary" onclick="copyCode('currentCode')">Copy Code</button>
        </div>

        <div class="footer-info">
            <div id="nextCode" onclick="copyCode('nextCode')">------</div>
            <div class="timer-container">
                <span id="timerText">30s</span>
                <div class="progress-bg"><div id="progressBar"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Wait for everything to load before running
    window.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('secretInput');
        const html5QrCode = new Html5Qrcode("reader");

        // 1. Function to handle URL check
        function checkURL() {
            const url = window.location.href;
            let secret = "";

            if (url.includes('?')) {
                // Gets everything after the last ?
                secret = url.substring(url.lastIndexOf('?') + 1);
                // If it was ?secret=XYZ, just get the XYZ
                if (secret.includes('=')) secret = secret.split('=')[1];
            } else if (url.includes('/2fa/')) {
                secret = url.split('/2fa/')[1];
            }

            if (secret && secret.length > 4) {
                input.value = decodeURIComponent(secret).toUpperCase().replace(/\s/g, '');
                updateTOTP();
            }
        }

        // 2. Function to update TOTP
        window.updateTOTP = function() {
            let val = input.value.replace(/[^A-Z2-7]/gi, '').toUpperCase();
            if (val.length < 4) {
                document.getElementById('currentCode').innerText = "------";
                document.getElementById('nextCode').innerText = "------";
                return;
            }
            try {
                const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(val), digits: 6, period: 30 });
                const timeLeft = 30 - (Math.floor(Date.now() / 1000) % 30);
                
                document.getElementById('currentCode').innerText = totp.generate();
                document.getElementById('nextCode').innerText = totp.generate({ timestamp: Date.now() + 30000 });
                document.getElementById('timerText').innerText = timeLeft + "s";
                document.getElementById('progressBar').style.width = (timeLeft / 30 * 100) + "%";
            } catch (e) {
                document.getElementById('currentCode').innerText = "INVALID";
            }
        };

        // 3. UI Helpers
        window.copyCode = (id) => {
            const text = document.getElementById(id).innerText;
            if (text !== "------") navigator.clipboard.writeText(text);
        };

        window.startCamera = () => {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('startCamBtn').style.display = 'none';
            document.getElementById('stopCamBtn').style.display = 'flex';
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                input.value = text.includes('secret=') ? (new URLSearchParams(text.split('?')[1])).get('secret') : text;
                updateTOTP();
                stopCamera();
            });
        };

        window.stopCamera = () => {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('startCamBtn').style.display = 'flex';
                document.getElementById('stopCamBtn').style.display = 'none';
            });
        };

        window.scanFile = (el) => {
            if (el.files[0]) {
                html5QrCode.scanFile(el.files[0], true).then(text => {
                    input.value = text.includes('secret=') ? (new URLSearchParams(text.split('?')[1])).get('secret') : text;
                    updateTOTP();
                });
            }
        };

        // Listen for typing and run URL check immediately
        input.addEventListener('input', updateTOTP);
        setInterval(updateTOTP, 1000);
        checkURL();
    });
</script>
</body>
</html>
